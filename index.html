<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almanax</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Catppuccin Mocha ─────────────────────────────── */
:root {
  --base:   #1e1e2e;
  --mantle: #181825;
  --crust:  #11111b;
  --surface0: #313244;
  --surface1: #45475a;
  --surface2: #585b70;
  --overlay0: #6c7086;
  --overlay1: #7f849c;
  --overlay2: #9399b2;
  --subtext0: #a6adc8;
  --subtext1: #bac2de;
  --text:   #cdd6f4;

  --rosewater: #f5e0dc;
  --flamingo:  #f2cdcd;
  --pink:      #f5c2e7;
  --mauve:     #cba6f7;
  --red:       #f38ba8;
  --maroon:    #eba0ac;
  --peach:     #fab387;
  --yellow:    #f9e2af;
  --green:     #a6e3a1;
  --teal:      #94e2d5;
  --sky:       #89dceb;
  --sapphire:  #74c7ec;
  --blue:      #89b4fa;
  --lavender:  #b4befe;

  --radius: 10px;
  --radius-sm: 6px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--base); min-height:100vh; font-family:'Inter',sans-serif; color:var(--text); display:flex; flex-direction:column; }

/* ── HEADER ───────────────────────────────────────── */
.hdr {
  background: var(--mantle);
  border-bottom: 1px solid var(--surface0);
  height: 54px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.5rem;
  position: sticky; top: 0; z-index: 100;
}

.logo { display: flex; align-items: center; gap: .7rem; }
.logo-dot {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--mauve);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--mantle); font-weight: 700;
}
.logo-name { font-size: .95rem; font-weight: 600; color: var(--text); }
.logo-sub  { font-size: .68rem; color: var(--overlay0); margin-top: 1px; }

.hdr-center { display: flex; gap: 4px; }
.vtab {
  background: none; border: none;
  color: var(--overlay1); padding: .4rem .9rem;
  font-family: 'Inter',sans-serif; font-size: .75rem; font-weight: 500;
  cursor: pointer; transition: all .15s; border-radius: var(--radius-sm);
}
.vtab:hover { background: var(--surface0); color: var(--text); }
.vtab.on { background: var(--mauve); color: var(--mantle); font-weight: 600; }

.hdr-right { display: flex; align-items: center; gap: .5rem; }
.vtab-group { position: relative; }
.vtab-dropdown { position: absolute; top: calc(100% + 6px); left: 0; background: var(--mantle); border: 1px solid var(--surface1); border-radius: var(--radius-sm); overflow: hidden; z-index: 200; min-width: 150px; box-shadow: 0 4px 16px rgba(0,0,0,.4); }
.vdrop-item { display: block; width: 100%; background: none; border: none; color: var(--subtext0); padding: .5rem 1rem; font-family: 'Inter',sans-serif; font-size: .75rem; font-weight: 500; cursor: pointer; text-align: left; transition: all .1s; }
.vdrop-item:hover { background: var(--surface0); color: var(--text); }
.vdrop-item.on { color: var(--mauve); font-weight: 600; }
.nbtn-hdr {
  background: var(--surface0); border: none;
  color: var(--subtext0); padding: .38rem .85rem;
  font-family: 'Inter',sans-serif; font-size: .72rem; font-weight: 500;
  cursor: pointer; border-radius: var(--radius-sm); transition: all .2s;
  display: flex; align-items: center; gap: .4rem;
}
.nbtn-hdr:hover, .nbtn-hdr.on { background: var(--mauve); color: var(--mantle); }
.ndot { width:6px; height:6px; border-radius:50%; background:var(--overlay0); transition:all .2s; }
.nbtn-hdr.on .ndot { background: var(--mantle); }
.mlcount { background: var(--red); color: var(--mantle); border-radius: 4px; padding: 0 5px; font-size: .6rem; font-weight: 700; margin-left: 2px; display: none; }

/* ── LAYOUT ───────────────────────────────────────── */
.layout { display: grid; grid-template-columns: 1fr 380px; flex: 1; min-height: calc(100vh - 54px); }
.main { padding: 1.2rem 1.5rem; overflow-y: auto; overflow-x: hidden; }
.panel { background: var(--mantle); border-left: 1px solid var(--surface0); padding: 1.2rem; position: sticky; top: 54px; height: calc(100vh - 54px); overflow-y: auto; display: flex; flex-direction: column; gap: 1.2rem; }

/* ── TOPBAR ───────────────────────────────────────── */
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: .5rem; }
.mtitle { font-size: 1.1rem; font-weight: 600; color: var(--text); }
.mtitle span { color: var(--mauve); }
.nav-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

.nbtn { background: var(--surface0); border: none; color: var(--subtext0); width: 30px; height: 30px; border-radius: var(--radius-sm); cursor: pointer; font-size: .8rem; transition: all .15s; display: flex; align-items: center; justify-content: center; }
.nbtn:hover { background: var(--surface1); color: var(--text); }
.tbtn { background: var(--surface0); border: none; color: var(--subtext0); padding: 0 .8rem; height: 30px; border-radius: var(--radius-sm); cursor: pointer; font-size: .72rem; font-weight: 500; transition: all .15s; }
.tbtn:hover { background: var(--surface1); color: var(--text); }

.dpick {
  background: var(--surface0); border: none; color: var(--subtext1);
  padding: .15rem .6rem; border-radius: var(--radius-sm);
  font-size: .78rem; height: 30px; outline: none; cursor: pointer;
  font-family: 'Inter',sans-serif;
}
.dpick:focus { background: var(--surface1); }

.swrap { position: relative; }
.swrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; fill: none; stroke: var(--overlay0); stroke-width: 2; }
.sinput { background: var(--surface0); border: none; color: var(--text); padding: .15rem .8rem .15rem 30px; border-radius: var(--radius-sm); font-size: .78rem; width: 155px; height: 30px; outline: none; font-family: 'Inter',sans-serif; }
.sinput::placeholder { color: var(--overlay0); }
.sinput:focus { background: var(--surface1); }

/* ── FILTRES ──────────────────────────────────────── */
.fbar { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 1rem; }
.chip {
  display: flex; align-items: center; gap: .3rem;
  padding: .22rem .65rem; border-radius: 20px;
  background: var(--surface0); color: var(--overlay1);
  font-size: .68rem; font-weight: 500;
  cursor: pointer; transition: all .15s; user-select: none; white-space: nowrap;
  border: 1.5px solid transparent;
}
.cdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.chip:hover { background: var(--surface1); color: var(--text); }
.chip.on { color: var(--mantle); font-weight: 600; border-color: transparent; }

/* ── CAL HEAD ─────────────────────────────────────── */
.cal-head { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; margin-bottom: 6px; }
.chd { text-align: center; font-size: .65rem; font-weight: 600; color: var(--overlay0); padding: .25rem 0; text-transform: uppercase; letter-spacing: .08em; }

/* ── TILES ────────────────────────────────────────── */
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }

.cday {
  background: var(--surface0);
  border-radius: var(--radius);
  padding: .5rem .5rem .45rem;
  cursor: pointer;
  transition: background .15s, transform .1s, box-shadow .15s;
  position: relative;
  min-height: 88px;
  border: 1.5px solid transparent;
}
.cday:hover { background: var(--surface1); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.3); }
.cday.sel { border-color: var(--mauve); background: var(--surface1); box-shadow: 0 0 0 1px var(--mauve), 0 4px 16px rgba(203,166,247,.2); }
.cday.tod { border-color: var(--blue); }
.cday.tod .dnum { color: var(--blue); font-weight: 700; }
.cday.oth { opacity: .2; pointer-events: none; }
.cday.fout { opacity: .1; }
.cday.past { opacity: .45; filter: grayscale(55%); }
.cday.inlist::after { content: ''; position: absolute; top: 6px; right: 6px; width: 6px; height: 6px; border-radius: 50%; background: var(--pink); }

.dnum { font-size: .78rem; font-weight: 600; color: var(--subtext0); margin-bottom: .3rem; }

.dbadge {
  font-size: .58rem; font-weight: 600;
  padding: 2px 6px; border-radius: 4px;
  display: block; margin-bottom: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 100%;
}
.dimg { width: 22px; height: 22px; image-rendering: pixelated; position: absolute; bottom: 5px; right: 5px; opacity: .8; border-radius: 4px; }
.dspin { width: 12px; height: 12px; border: 1.5px solid var(--surface2); border-top-color: var(--mauve); border-radius: 50%; animation: spin .9s linear infinite; }

/* ── LISTE ────────────────────────────────────────── */
#listView, #mylistView { display: none; }
.lhdr { display: grid; grid-template-columns: 105px 36px 1fr 130px 28px; gap: .6rem; padding: .4rem .8rem; font-size: .6rem; font-weight: 600; letter-spacing: .1em; color: var(--overlay0); text-transform: uppercase; border-bottom: 1px solid var(--surface0); margin-bottom: 4px; }
.lrows { display: flex; flex-direction: column; gap: 3px; }
.lrow { display: grid; grid-template-columns: 105px 36px 1fr 130px 28px; gap: .6rem; align-items: center; padding: .55rem .8rem; background: var(--surface0); border-radius: var(--radius-sm); cursor: pointer; transition: all .15s; border: 1.5px solid transparent; }
.lrow:hover { background: var(--surface1); }
.lrow.sel { border-color: var(--mauve); }
.lrow.tod .ldate { color: var(--blue); font-weight: 600; }
.lrow.fout { display: none; }
.lrow.inlist { border-left: 3px solid var(--pink); }
.lrow.past { opacity: .4; filter: grayscale(50%); }
.ldate { font-size: .76rem; font-weight: 500; color: var(--subtext1); }
.limg { display: flex; align-items: center; justify-content: center; }
.limg img { width: 28px; height: 28px; image-rendering: pixelated; border-radius: 4px; }
.lbonus { font-size: .82rem; color: var(--text); overflow: hidden; }
.lbonusdesc { font-size: .7rem; color: var(--overlay1); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.litem { font-size: .75rem; color: var(--subtext0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ltags { display: flex; flex-direction: column; gap: 2px; }
.lbadge { font-size: .56rem; font-weight: 600; padding: 1px 6px; border-radius: 4px; display: inline-block; white-space: nowrap; }
.lfav { background: none; border: 1.5px solid var(--surface2); color: var(--overlay0); width: 26px; height: 26px; border-radius: var(--radius-sm); cursor: pointer; font-size: .75rem; transition: all .15s; display: flex; align-items: center; justify-content: center; }
.lfav:hover, .lfav.on { border-color: var(--pink); color: var(--pink); }
.cinfo { font-size: .68rem; color: var(--overlay0); margin-bottom: .5rem; }
.cinfo span { color: var(--mauve); font-weight: 600; }
.loadmore { background: var(--surface0); border: none; color: var(--subtext0); width: 100%; padding: .6rem; border-radius: var(--radius-sm); cursor: pointer; font-size: .75rem; font-weight: 500; margin-top: 6px; transition: all .15s; font-family: 'Inter',sans-serif; }
.loadmore:hover { background: var(--surface1); color: var(--text); }
.lempty { text-align: center; padding: 3rem; color: var(--overlay0); font-size: .85rem; }

/* ── MA LISTE ─────────────────────────────────────── */
.mlstats { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 1rem; }
.mlstat { background: var(--surface0); border-radius: var(--radius-sm); padding: .7rem; text-align: center; }
.mlval { font-size: 1.5rem; font-weight: 700; color: var(--mauve); }
.mllbl { font-size: .6rem; color: var(--overlay0); text-transform: uppercase; letter-spacing: .1em; margin-top: 2px; }

/* ── PANEL ────────────────────────────────────────── */
.ptitle { font-size: .62rem; font-weight: 600; letter-spacing: .15em; color: var(--overlay0); text-transform: uppercase; margin-bottom: .7rem; display: flex; align-items: center; gap: .5rem; }
.ptitle::after { content: ''; flex: 1; height: 1px; background: var(--surface0); }
.det-date { font-size: .95rem; font-weight: 600; color: var(--text); margin-bottom: .7rem; }
.det-empty { color: var(--overlay0); font-size: .82rem; text-align: center; padding: 1.5rem 0; }
.offrow { display: flex; align-items: center; gap: .8rem; background: var(--surface0); border-radius: var(--radius-sm); padding: .65rem; margin-bottom: .65rem; }
.offimg { width: 44px; height: 44px; background: var(--base); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.offimg img { width: 36px; height: 36px; image-rendering: pixelated; }
.offname { font-size: .85rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.offqty { font-size: .72rem; color: var(--mauve); margin-top: 2px; font-weight: 500; }
.bblock { background: var(--surface0); border-radius: var(--radius-sm); border-left: 3px solid var(--mauve); padding: .7rem .9rem; margin-bottom: .6rem; }
.btags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: .45rem; }
.btag { font-size: .58rem; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
.bname { font-size: .9rem; font-weight: 600; color: var(--text); margin-bottom: .25rem; }
.bdesc { font-size: .8rem; color: var(--subtext0); line-height: 1.55; }
.bgod { display: flex; align-items: center; gap: .5rem; font-size: .72rem; color: var(--overlay1); margin-top: .5rem; }
.addbtn { background: var(--surface0); border: none; color: var(--subtext0); width: 100%; padding: .5rem; border-radius: var(--radius-sm); cursor: pointer; font-size: .75rem; font-weight: 500; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: .4rem; font-family: 'Inter',sans-serif; }
.addbtn:hover { background: var(--surface1); color: var(--text); }
.addbtn.on { background: rgba(245,194,231,.15); color: var(--pink); }
.hitem { display: flex; align-items: center; gap: .5rem; padding: .42rem .5rem; background: var(--surface0); border-radius: var(--radius-sm); cursor: pointer; transition: background .1s; margin-bottom: 3px; }
.hitem:hover { background: var(--surface1); }
.hdate { font-size: .62rem; color: var(--overlay0); min-width: 50px; flex-shrink: 0; }
.hbadge { font-size: .58rem; font-weight: 600; padding: 1px 6px; border-radius: 4px; flex-shrink: 0; }
.hname { color: var(--subtext0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: .78rem; }

/* ── MISC ─────────────────────────────────────────── */
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--surface1); color: var(--text); padding: .6rem 1.2rem; border-radius: var(--radius-sm); font-size: .78rem; font-weight: 500; opacity: 0; transition: all .25s; z-index: 999; pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,.4); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.pload { display: flex; align-items: center; gap: .6rem; padding: 1.5rem 0; justify-content: center; color: var(--overlay0); font-size: .8rem; }
.spin { width: 18px; height: 18px; border: 2px solid var(--surface2); border-top-color: var(--mauve); border-radius: 50%; animation: spin .8s linear infinite; }
.fi { animation: fi .25s ease both; }

.tday.on { background: var(--mauve); color: var(--mantle); }
.tcard { background: var(--surface0); border-radius: var(--radius); padding: .8rem 1rem; margin-bottom: 6px; display: grid; grid-template-columns: 46px 1fr auto; gap: .8rem; align-items: center; }
.tcard.done { opacity: .45; }
.tcard-dates { font-size: .65rem; color: var(--overlay0); margin-top: 3px; }
.tcard-date-pill { display: inline-flex; align-items: center; gap: 3px; background: var(--surface1); border-radius: 4px; padding: 1px 6px; margin: 2px 2px 0 0; font-size: .62rem; color: var(--subtext0); }
.tcard-date-pill.soon { background: rgba(243,139,168,.2); color: var(--red); }
.tcard-date-pill.today { background: rgba(137,180,250,.3); color: var(--blue); font-weight: 600; }
.tprice { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
.tprice input { background: var(--surface1); border: none; border-radius: 4px; color: var(--text); font-size: .75rem; width: 100px; padding: 4px 8px; text-align: right; font-family: 'Inter',sans-serif; outline: none; }
.tprice input:focus { background: var(--surface2); }
.tprice-label { font-size: .6rem; color: var(--overlay0); text-align: right; }
.tmargin { font-size: .78rem; font-weight: 600; text-align: right; margin-top: 2px; }
.tmargin.pos { color: var(--green); }
.tmargin.neg { color: var(--red); }
.tcheck { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--surface2); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; font-size: 11px; color: transparent; }
.tcheck.on { background: var(--green); border-color: var(--green); color: var(--mantle); }
.tsection-title { font-size: .62rem; font-weight: 600; letter-spacing: .12em; color: var(--overlay0); text-transform: uppercase; margin: 1rem 0 .5rem; display: flex; align-items: center; gap: .5rem; }
.tsection-title::after { content: ''; flex: 1; height: 1px; background: var(--surface0); }
.tsection-title span { color: var(--mauve); }
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 3px; }
.panel::-webkit-scrollbar { width: 5px; }
.panel::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 3px; }
.tcard { display:grid; grid-template-columns:60px 1fr auto auto; gap:.8rem; align-items:start; background:var(--surface0); border-radius:var(--radius); padding:.8rem; margin-bottom:6px; border:1.5px solid transparent; transition:all .15s; }
.tcard.done { opacity:.5; }
.tcard:hover { border-color:var(--surface2); }
.tcheck { width:22px; height:22px; border-radius:50%; border:2px solid var(--surface2); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.75rem; color:var(--green); transition:all .15s; margin-top:4px; }
.tcheck:hover { border-color:var(--green); }
.tcheck.on { background:var(--green); border-color:var(--green); color:var(--mantle); }
.tcard-img { width:36px; height:36px; image-rendering:pixelated; border-radius:6px; }
.tcard-name { font-size:.88rem; font-weight:600; color:var(--text); margin-bottom:3px; }
.tcard-qty { font-size:.75rem; color:var(--mauve); font-weight:500; margin-bottom:5px; }
.tcard-dates { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:6px; }
.tpill { font-size:.62rem; font-weight:600; padding:2px 7px; border-radius:10px; background:var(--surface1); color:var(--subtext0); }
.tpill.today { background:var(--blue); color:var(--mantle); }
.tpill.soon { background:var(--peach); color:var(--mantle); }
.tprices { display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; }
.tprice-group { display:flex; flex-direction:column; gap:2px; }
.tprice-label { font-size:.6rem; color:var(--overlay0); text-transform:uppercase; letter-spacing:.08em; }
.tprice-group input, .tsales-input {
  background:var(--surface1); border:1px solid var(--surface2); color:var(--text);
  padding:4px 8px; border-radius:var(--radius-sm); font-size:.78rem; width:80px;
  outline:none; font-family:Inter,sans-serif;
  -moz-appearance:textfield; appearance:textfield;
}
.tprice-group input::-webkit-outer-spin-button,
.tprice-group input::-webkit-inner-spin-button,
.tsales-input::-webkit-outer-spin-button,
.tsales-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
.tprice-group input:focus, .tsales-input:focus { border-color:var(--mauve); }
.tmargin { font-size:.78rem; font-weight:600; padding:3px 10px; border-radius:var(--radius-sm); }
.tmargin.pos { background:rgba(166,227,161,.15); color:var(--green); }
.tmargin.neg { background:rgba(243,139,168,.15); color:var(--red); }
.tmargin.zero { color:var(--overlay0); }
.tsales { display:flex; flex-direction:row; gap:10px; align-items:flex-end; flex-wrap:wrap; }
.tsales-group { display:flex; flex-direction:column; gap:2px; }
.tsales-label { font-size:.6rem; color:var(--overlay0); text-transform:uppercase; letter-spacing:.08em; }

.trecap { background:var(--surface0); border-radius:var(--radius); padding:.9rem 1.1rem; margin-top:10px; border-left:3px solid var(--mauve); }
.trecap-row { display:flex; gap:1.5rem; align-items:center; flex-wrap:wrap; }
.trecap-item { display:flex; flex-direction:column; gap:2px; }
.trecap-val { font-size:1.1rem; font-weight:700; }
.trecap-lbl { font-size:.6rem; color:var(--overlay0); text-transform:uppercase; letter-spacing:.08em; }

/* ── Bloc-note ───────────────────────────────────── */
.notes-layout { display:grid; grid-template-columns:220px 1fr; gap:12px; height:calc(100vh - 54px - 2.4rem); }
.notes-sidebar { display:flex; flex-direction:column; gap:6px; }
.notes-new-btn { background:var(--mauve); border:none; color:var(--mantle); padding:.5rem .8rem; border-radius:var(--radius-sm); font-size:.78rem; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:all .15s; display:flex; align-items:center; gap:.4rem; justify-content:center; }
.notes-new-btn:hover { background:var(--lavender); }
.notes-list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:4px; }
.notes-list::-webkit-scrollbar { width:4px; }
.notes-list::-webkit-scrollbar-thumb { background:var(--surface1); border-radius:2px; }

<script>
/* ── Catégories ─────────────────────────────────── */
var CATS = [
  {id:'all',         label:'Toutes',             fg:'#cdd6f4', bg:'#45475a'},
  {id:'eco-craft',   label:'Eco craft',           fg:'#fab387', bg:'rgba(250,179,135,.2)'},
  {id:'crafts-supp', label:'Crafts supp.',         fg:'#f9e2af', bg:'rgba(249,226,175,.2)'},
  {id:'eco-fm',      label:'Eco FM',              fg:'#peach',  bg:'rgba(250,179,135,.15)'},
  {id:'songes',      label:'Songes infinis',       fg:'#cba6f7', bg:'rgba(203,166,247,.2)'},
  {id:'xp-combat',   label:'XP combats',          fg:'#f38ba8', bg:'rgba(243,139,168,.2)'},
  {id:'xp-metiers',  label:'XP métiers',          fg:'#89b4fa', bg:'rgba(137,180,250,.2)'},
  {id:'xp-montures', label:'XP montures',  fg:'#a6e3a1', bg:'rgba(166,227,161,.2)'},
  {id:'xp-quetes',   label:'XP quêtes',   fg:'#f9e2af', bg:'rgba(249,226,175,.2)'},
  {id:'jet',         label:'Meilleur jet',         fg:'#94e2d5', bg:'rgba(148,226,213,.2)'},
  {id:'elevage',     label:'Élevage',             fg:'#a6e3a1', bg:'rgba(166,227,161,.15)'},
  {id:'reapp',       label:'Réapp. récolt.',  fg:'#74c7ec', bg:'rgba(116,199,236,.2)'},
  {id:'recoltes',    label:'Qté récoltes',        fg:'#89dceb', bg:'rgba(137,220,235,.2)'},
  {id:'drop',        label:'Drop',                 fg:'#a6e3a1', bg:'rgba(166,227,161,.2)'},
  {id:'butin',       label:'Butin perc.',    fg:'#fab387', bg:'rgba(250,179,135,.15)'},
  {id:'kolizeum',    label:'Kolizéum',            fg:'#f9e2af', bg:'rgba(249,226,175,.15)'},
  {id:'archis',      label:'Archis',       fg:'#b4befe', bg:'rgba(180,190,254,.2)'},
  {id:'event',       label:'Évent',      fg:'#cba6f7', bg:'rgba(203,166,247,.15)'},
  {id:'chasse',      label:'Chasse trésor',  fg:'#94e2d5', bg:'rgba(148,226,213,.15)'},
  {id:'mylist',      label:'Ma liste',            fg:'#f5c2e7', bg:'rgba(245,194,231,.2)'}
];
CATS[3].fg = '#fab387';

function getCat(id) {
  for (var i=0;i<CATS.length;i++) if(CATS[i].id===id) return CATS[i];
  return CATS[0];
}

function classify(desc, name) {
  desc = (desc||'').toLowerCase(); name = (name||'').toLowerCase();
  var t = desc+' '+name, tags = [];
  function add(id){ if(tags.indexOf(id)===-1) tags.push(id); }
  if(/\u00e9conomis|ingr\u00e9dient.*gratuit|15.*%.*ingr\u00e9dient/.test(t)) add('eco-craft');
  if(/seconde|chance.*cr\u00e9er|craft.*suppl\u00e9mentaire|25.*%.*fabriqu/.test(t)) add('crafts-supp');
  if(/forgemagie|rune|\u00e9co.*fm/.test(t)) add('eco-fm');
  if(/exp\u00e9rience.*m\u00e9tier|xp.*m\u00e9tier|50.*%.*m\u00e9tier/.test(t)) add('xp-metiers');
  if(/monture|familier|dragodinde/.test(t)) add('xp-montures');
  if(/qu\u00eate.*kama|kama.*qu\u00eate|exp\u00e9rience.*qu\u00eate/.test(t)) add('xp-quetes');
  if(/exp\u00e9rience.*combat|combat.*exp\u00e9rience|bwork|monstre/.test(t)) add('xp-combat');
  var hasXP=false; for(var i=0;i<tags.length;i++) if(tags[i].indexOf('xp')===0){hasXP=true;break;}
  if(!hasXP&&/exp\u00e9rience|xp/.test(t)) add('xp-combat');
  if(/percepteur/.test(t)) add('butin');
  if(/\bdrop\b|capsule|2 fois plus/.test(t)) add('drop');
  if(/r\u00e9apparition.*r\u00e9colt|repousse/.test(t)) add('reapp');
  if(/quantit\u00e9.*r\u00e9colt|double.*r\u00e9colte/.test(t)) add('recoltes');
  if(/songe/.test(t)) add('songes');
  if(/koliz\u00e9um|koli/.test(t)) add('kolizeum');
  if(/\u00e9levage/.test(t)) add('elevage');
  if(/meilleur jet|jet/.test(t)) add('jet');
  if(/archi|archimonstre/.test(t)) add('archis');
  if(/chasse.*tr\u00e9sor/.test(t)) add('chasse');
  if(/\bkama\b/.test(t)&&tags.indexOf('xp-quetes')===-1) add('xp-quetes');
  if(/temporis|sp\u00e9cial|\u00e9v\u00e8ne/.test(t)) add('event');
  return tags.length>0?tags:['event'];
}

/* ── State ──────────────────────────────────────── */
var MO=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
var SH=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
var tod=new Date(); tod.setHours(0,0,0,0);
var vY=tod.getFullYear(), vM=tod.getMonth();
var selDate=new Date(tod);
var filt='all', searchQ='', viewMode='cal';
var cache={}, notif=false, listData=[], skipScroll=false;
var myList={};
try{var sv=JSON.parse(localStorage.getItem('alm_mylist')||'[]');for(var i=0;i<sv.length;i++)myList[sv[i]]=true;}catch(e){}

function saveMyList(){try{localStorage.setItem('alm_mylist',JSON.stringify(Object.keys(myList)));}catch(e){}triggerAutoSave();}
function inML(ds){return !!myList[ds];}
function pad(n){return n<10?'0'+n:''+n;}
function fmtK(n){return Math.round(n).toLocaleString('fr-FR');}
function fmt(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function fmtFR(d){return d.getDate()+' '+MO[d.getMonth()]+' '+d.getFullYear();}
function fmtFRDay(d){var j=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];return j[d.getDay()]+' '+d.getDate()+' '+MO[d.getMonth()]+' '+d.getFullYear();}
function fmtSH(d){return pad(d.getDate())+' '+SH[d.getMonth()]+' '+d.getFullYear();}
function fmtDM(d){return d.getDate()+' '+MO[d.getMonth()];}

function toast(msg){var e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(function(){e.classList.remove('show');},2500);}

function fetchDay(ds){
  if(cache[ds]) return Promise.resolve(cache[ds]);
  var urls=['https://api.dofusdu.de/dofus3/v1/fr/almanax/'+ds,'https://api.dofusdu.de/dofus2/fr/v1/almanax/'+ds];
  function tryUrl(i){
    if(i>=urls.length) return Promise.resolve(null);
    return fetch(urls[i]).then(function(r){if(r.ok)return r.json().then(function(d){cache[ds]=d;return d;});return tryUrl(i+1);}).catch(function(){return tryUrl(i+1);});
  }
  return tryUrl(0);
}

/* ── Filtres ────────────────────────────────────── */
function buildFBar(){
  var html='';
  for(var i=0;i<CATS.length;i++){
    var c=CATS[i];
    var bg=c.id==='all'?'var(--surface1)':c.bg;
    html+='<div class="chip'+(c.id==='all'?' on':'')+'" data-t="'+c.id+'" onclick="setF(\''+c.id+'\')" style="'+(c.id==='all'?'background:var(--surface1);color:var(--text)':'')+'">'
      +'<div class="cdot" style="background:'+c.fg+'"></div>'+c.label+'</div>';
  }
  document.getElementById('fbar').innerHTML=html;
}

function setF(t){
  filt=t;
  document.querySelectorAll('.chip').forEach(function(c){
    var cat=getCat(c.dataset.t);
    if(c.dataset.t===t){
      c.classList.add('on');
      c.style.background=t==='all'?'var(--mauve)':cat.bg.replace('.2',',.8').replace('.15',',.8');
      c.style.color=t==='all'?'var(--mantle)':cat.fg;
    } else {
      c.classList.remove('on');
      c.style.background=''; c.style.color='';
    }
  });
  if(viewMode==='cal') applyCalF(); else if(viewMode==='list') applyListF();
}

function onSearch(){searchQ=(document.getElementById('sinput')||{}).value||'';if(viewMode==='cal')applyCalF();else if(viewMode==='list')applyListF();}

function matchF(tagsStr,ds){
  if(filt==='all') return true;
  if(filt==='mylist') return inML(ds);
  var tags=(tagsStr||'').split(',');
  for(var i=0;i<tags.length;i++) if(tags[i]===filt) return true;
  return false;
}

/* ── Calendrier ─────────────────────────────────── */
function getDays(y,m){
  var days=[],first=new Date(y,m,1),last=new Date(y,m+1,0);
  var s=(first.getDay()+6)%7;
  for(var i=s-1;i>=0;i--) days.push({date:new Date(y,m,-i),oth:true});
  for(var i=1;i<=last.getDate();i++) days.push({date:new Date(y,m,i),oth:false});
  while(days.length%7!==0){var p=days[days.length-1].date,nx=new Date(p);nx.setDate(p.getDate()+1);days.push({date:nx,oth:true});}
  return days;
}

function renderCal(){
  document.getElementById('mTitle').innerHTML=MO[vM]+' <span>'+vY+'</span>';
  var days=getDays(vY,vM),todStr=fmt(tod),selStr=fmt(selDate),html='';
  for(var i=0;i<days.length;i++){
    var item=days[i],ds=fmt(item.date);
    var cls='cday'+(item.oth?' oth':'')+(ds===todStr?' tod':'')+(ds===selStr?' sel':'')+(inML(ds)?' inlist':'');
    html+='<div class="'+cls+'" data-date="'+ds+'" data-tags="" onclick="sel(\''+ds+'\')">'
      +'<div class="dnum">'+item.date.getDate()+'</div>'
      +'<div class="dspin"></div></div>';
  }
  document.getElementById('cGrid').innerHTML=html;
  for(var i=0;i<days.length;i++) if(!days[i].oth) loadCell(fmt(days[i].date));
}

function loadCell(ds){
  fetchDay(ds).then(function(data){
    var el=document.querySelector('.cday[data-date="'+ds+'"]');
    if(!el) return;
    var sp=el.querySelector('.dspin'); if(sp) sp.remove();
    if(!data) return;
    var tags=classify(data.bonus&&data.bonus.description, data.bonus&&data.bonus.type&&data.bonus.type.name);
    el.dataset.tags=tags.join(',');
    el.dataset.search=((data.bonus&&data.bonus.type&&data.bonus.type.name||'')+' '+(data.bonus&&data.bonus.description||'')+' '+(data.tribute&&data.tribute.item&&data.tribute.item.name||'')).toLowerCase();
    var img=data.tribute&&data.tribute.item&&data.tribute.item.image_urls&&data.tribute.item.image_urls.icon||'';
    var bHtml='';
    var max=tags.length>2?2:tags.length;
    for(var i=0;i<max;i++){
      var c=getCat(tags[i]);
      bHtml+='<span class="dbadge" style="color:'+c.fg+';background:'+c.bg+'">'+c.label+'</span>';
    }
    el.insertAdjacentHTML('beforeend',bHtml+(img?'<img class="dimg" src="'+img+'" alt="">':''));
    if(ds<fmt(tod)) el.classList.add('past');
    applyCalF();
  });
}

function applyCalF(){
  var q=searchQ.toLowerCase();
  document.querySelectorAll('.cday:not(.oth)').forEach(function(el){
    var ok=matchF(el.dataset.tags,el.dataset.date)&&(!q||!el.dataset.search||el.dataset.search.indexOf(q)!==-1);
    el.classList.toggle('fout',!ok&&!!el.dataset.tags);
  });
}

/* ── Liste ──────────────────────────────────────── */
function renderList(){
  document.getElementById('mTitle').innerHTML='<span>Vue liste</span>';
  document.getElementById('calNav').style.display='none';
  document.getElementById('lRows').innerHTML='<div class="pload"><div class="spin"></div><span>Chargement...</span></div>';
  document.getElementById('loadMoreBtn').style.display='none';
  listData=[];
  var start=new Date(tod); start.setDate(tod.getDate()-30);
  var dates=[]; for(var i=0;i<90;i++){var d=new Date(start);d.setDate(start.getDate()+i);dates.push(d);}
  Promise.all(dates.map(function(d){return fetchDay(fmt(d)).then(function(data){return {date:d,data:data};});}))
    .then(function(r){listData=r.filter(function(x){return x.data;});renderLRows();});
}

function renderLRows(){
  var todStr=fmt(tod),selStr=fmt(selDate),html='';
  for(var i=0;i<listData.length;i++){
    var item=listData[i],data=item.data,ds=fmt(item.date);
    var nm=(data.bonus&&data.bonus.type&&data.bonus.type.name)||'—';
    var dc=(data.bonus&&data.bonus.description)||'';
    var tribute=data.tribute||{},itm=tribute.item||{},qty=tribute.quantity||1;
    var tags=classify(dc,nm),img=(itm.image_urls&&itm.image_urls.icon)||'';
    var isTod=ds===todStr,isSel=ds===selStr,inL=inML(ds),isPast=ds<todStr&&!isTod;
    var sd=(nm+' '+dc+' '+(itm.name||'')).toLowerCase();
    var bh=''; for(var j=0;j<tags.length;j++){var c=getCat(tags[j]);bh+='<span class="lbadge" style="color:'+c.fg+';background:'+c.bg+'">'+c.label+'</span>';}
    html+='<div class="lrow'+(isTod?' tod':'')+(isSel?' sel':'')+(inL?' inlist':'')+(isPast?' past':'')+'" data-date="'+ds+'" data-tags="'+tags.join(',')+'" data-search="'+sd+'" onclick="sel(\''+ds+'\')">'
      +'<div class="ldate">'+fmtDM(item.date)+(isTod?'<br><span style="color:var(--blue);font-size:.5rem">&#9664; Aujourd\'hui</span>':'')+'</div>'
      +'<div class="limg">'+(img?'<img src="'+img+'" alt="">':'')+'</div>'
      +'<div class="lbonus">'+nm+'<div class="lbonusdesc">'+dc+'</div></div>'
      +'<div class="ltags">'+bh+'</div>'
      +'<button class="lfav'+(inL?' on':'')+'" onclick="event.stopPropagation();toggleML(\''+ds+'\')" title="Ma liste">&#9733;</button>'
      +'</div>';
  }
  html+='<div class="lempty" id="lempty" style="display:none">Aucun résultat.</div>';
  document.getElementById('lRows').innerHTML=html;
  document.getElementById('loadMoreBtn').style.display='block';
  updateCInfo(); applyListF();
  if(!skipScroll) setTimeout(function(){var el=document.querySelector('.lrow.tod');if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},150);
  skipScroll=false;
}

function applyListF(){
  var q=searchQ.toLowerCase(),visible=0;
  document.querySelectorAll('.lrow').forEach(function(el){
    var ok=matchF(el.dataset.tags,el.dataset.date)&&(!q||(el.dataset.search||'').indexOf(q)!==-1);
    el.classList.toggle('fout',!ok); if(ok)visible++;
  });
  var e=document.getElementById('lempty'); if(e)e.style.display=visible===0?'block':'none';
  updateCInfo(visible);
}

function updateCInfo(v){
  var total=listData.length,vis=v!==undefined?v:document.querySelectorAll('.lrow:not(.fout)').length;
  var el=document.getElementById('cInfo');
  if(el)el.innerHTML=(filt==='all'&&!searchQ)?'<span>'+total+'</span> jours chargés':'<span>'+vis+'</span> résultat'+(vis>1?'s':'')+' sur '+total+' jours';
}

function loadMore(){
  var btn=document.getElementById('loadMoreBtn');
  btn.textContent='Chargement...'; btn.disabled=true;
  var lastDate=listData.length>0?listData[listData.length-1].date:new Date(tod);
  var more=[]; for(var i=0;i<30;i++){var d=new Date(lastDate);d.setDate(lastDate.getDate()+i+1);more.push(d);}
  Promise.all(more.map(function(d){return fetchDay(fmt(d)).then(function(data){return {date:d,data:data};});}))
    .then(function(r){
      listData=listData.concat(r.filter(function(x){return x.data;}));
      skipScroll=true;
      var mainEl=document.querySelector('.main'),scrollPos=mainEl?mainEl.scrollTop:0;
      renderLRows();
      setTimeout(function(){if(mainEl)mainEl.scrollTop=scrollPos;},10);
      btn.textContent='↓ Charger plus de jours'; btn.disabled=false;
    });
}

/* ── Ma liste ───────────────────────────────────── */
function updateMLCount(){var n=Object.keys(myList).length,el=document.getElementById('mlCount');el.textContent=n;el.style.display=n>0?'inline':'none';}

function toggleML(ds){
  var wasIn=inML(ds);
  if(wasIn)delete myList[ds]; else myList[ds]=true;
  saveMyList(); updateMLCount(); loadNextML();
  document.querySelectorAll('[data-date="'+ds+'"]').forEach(function(el){
    el.classList.toggle('inlist',!wasIn);
    var fav=el.querySelector('.lfav'); if(fav)fav.classList.toggle('on',!wasIn);
  });
  var ab=document.getElementById('addBtn');
  if(ab){ab.classList.toggle('on',!wasIn);ab.textContent=!wasIn?'&#9733; Dans ma liste':'&#9734; Ajouter à ma liste';}
  toast(wasIn?'Retiré de ta liste':'Ajouté à ta liste !');
  if(viewMode==='mylist') renderML();
}

function renderML(){
  var content=document.getElementById('mlContent'),keys=Object.keys(myList);
  if(keys.length===0){content.innerHTML='<div class="lempty"><p style="color:var(--overlay0)">Ta liste est vide.<br>Ajoute des jours depuis le Calendrier ou la Liste.</p></div>';return;}
  keys.sort();
  var todStr=fmt(tod),upcoming=keys.filter(function(ds){return ds>=todStr;}),past=keys.filter(function(ds){return ds<todStr;});
  content.innerHTML='<div class="mlstats">'
    +'<div class="mlstat"><div class="mlval">'+keys.length+'</div><div class="mllbl">Total</div></div>'
    +'<div class="mlstat"><div class="mlval">'+upcoming.length+'</div><div class="mllbl">À venir</div></div>'
    +'<div class="mlstat"><div class="mlval">'+past.length+'</div><div class="mllbl">Passés</div></div>'
    +'</div>'
    +'<div class="ptitle">À venir</div><div id="mlUp" class="lrows" style="margin-bottom:1rem"></div>'
    +(past.length>0?'<div class="ptitle">Passés</div><div id="mlPast" class="lrows"></div>':'');

/* ── Sélection ──────────────────────────────────── */
function getAdjacentDay(currentDs, dir) {
  // En vue liste avec filtre actif : sauter aux éléments visibles
  if (viewMode === 'list') {
    var rows = Array.prototype.slice.call(document.querySelectorAll('.lrow:not(.fout)'));
    var dates = rows.map(function(r){ return r.dataset.date; }).filter(Boolean);
    dates.sort();
    var idx = dates.indexOf(currentDs);
    if (idx === -1) {
      // trouver le plus proche
      for (var i=0;i<dates.length;i++) if(dates[i]>currentDs){idx=i;break;}
      if(idx===-1) idx=dates.length-1;
    }
    var next = idx + dir;
    if (next >= 0 && next < dates.length) return dates[next];
    // Sinon fallback jour +/-1
  }
  // En vue calendrier ou sans filtre : jour précédent/suivant
  var d = new Date(currentDs.split('-')[0], parseInt(currentDs.split('-')[1])-1, parseInt(currentDs.split('-')[2]));
  d.setDate(d.getDate() + dir);
  return fmt(d);
}

function getWeekBounds(offset) {
  // Lundi de la semaine courante
  var now = new Date(tod);
  var day = now.getDay();
  var diffToMon = (day === 0 ? -6 : 1 - day);
  var monday = new Date(now);
  monday.setDate(now.getDate() + diffToMon + offset * 7);
  monday.setHours(0,0,0,0);
  var sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  return {monday: monday, sunday: sunday};
}

function shiftWeek(dir) {
  saveWeekRecap(tWeekOffset);
  tWeekOffset += dir;
  renderTrading();
}

function updateWeekLabel() {
  var b = getWeekBounds(tWeekOffset);
  var lbl = b.monday.getDate() + ' ' + MO[b.monday.getMonth()] + ' → ' + b.sunday.getDate() + ' ' + MO[b.sunday.getMonth()];
  document.getElementById('weekLabel').textContent = lbl;
}

function renderTrading() {
  var content = document.getElementById('tradingContent');
  content.innerHTML = '<div class="pload"><div class="spin"></div><span>Chargement...</span></div>';
  updateWeekLabel();
  var bounds = getWeekBounds(tWeekOffset);
  var dates = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(bounds.monday); d.setDate(bounds.monday.getDate() + i); dates.push(d);
  }
  Promise.all(dates.map(function(d) { return fetchDay(fmt(d)).then(function(data) { return {date:d, data:data}; }); }))
    .then(function(results) {
      var grouped = {};
      results.forEach(function(r) {
        if (!r.data || !r.data.tribute || !r.data.tribute.item) return;
        var item = r.data.tribute.item;
        var key = item.name;
        var qty = r.data.tribute.quantity || 1;
        if (!grouped[key]) {
          grouped[key] = { name: key, img: (item.image_urls && item.image_urls.icon) || '', totalQty: 0, dates: [] };
        }
        grouped[key].totalQty += qty;
        grouped[key].dates.push({ date: r.date, qty: qty });
      });
      var keys = Object.keys(grouped);
      if (keys.length === 0) { content.innerHTML = '<div class="lempty">Aucune offrande trouvée.</div>'; return; }
      content.innerHTML = keys.map(function(k) { return buildTCard(k, grouped[k]); }).join('');
      updateRecap();
    });
}

function buildTCard(key, data) {
  var todStr = fmt(tod);
  var safeId = key.replace(/[^a-zA-Z0-9]/g, '_');
  var isDone = !!tDone[safeId];
  var buy = tPrices[safeId + '_buy'] || '';
  var sell = tPrices[safeId + '_sell'] || '';
  var marginHtml = '';
  var perUnit = buy && sell ? Math.round(parseFloat(sell) - parseFloat(buy)) : null;
  var unitCls = perUnit !== null ? (perUnit > 0 ? 'pos' : perUnit < 0 ? 'neg' : 'zero') : '';
  marginHtml = '<div class="tmargin-unit tmargin ' + unitCls + '">'
    + (perUnit !== null ? (perUnit > 0 ? '+' : '') + fmtK(perUnit) + ' k / unité' : '') + '</div>';
  var pills = data.dates.map(function(d) {
    var ds = fmt(d.date);
    var diff = Math.round((d.date - tod) / 86400000);
    var cls = ds === todStr ? 'today' : diff <= 3 ? 'soon' : '';
    var lbl = d.date.getDate() + ' ' + MO[d.date.getMonth()];
    return '<span class="tpill ' + cls + '">' + lbl + '</span>';
  }).join('');
  var h = '';
  h += '<div class="tcard' + (isDone ? ' done' : '') + '" id="tc_' + safeId + '">';
  h += '<div style="display:flex;flex-direction:column;align-items:center;gap:6px">';
  h += data.img ? '<img class="tcard-img" src="' + data.img + '" alt="">' : '';
  h += '<div class="tcheck' + (isDone ? ' on' : '') + '" onclick="toggleTDone(this)"';
  h += ' data-key="' + safeId + '">' + (isDone ? '&#10003;' : '') + '</div>';
  h += '</div>';
  h += '<div>';
  h += '<div class="tcard-name">' + key + '</div>';
  h += '<div class="tcard-qty">Total : ' + data.totalQty + ' &#215; &#224; crafter</div>';
  h += '<div class="tcard-dates">' + pills + '</div>';
  h += '</div>';
  h += '<div class="tprices">';
  h += '<div class="tprice-group"><div class="tprice-label">Achat (k)</div>';
  h += '<input type="number" placeholder="0" value="' + buy + '" min="0"';
  h += ' oninput="setTPrice(this)" data-key="' + safeId + '" data-type="buy"></div>';
  h += '<div class="tprice-group"><div class="tprice-label">Vente (k)</div>';
  h += '<input type="number" placeholder="0" value="' + sell + '" min="0"';
  h += ' oninput="setTPrice(this)" data-key="' + safeId + '" data-type="sell"></div>';
  h += marginHtml;
  h += '</div>';
  var listed = tPrices[safeId + '_listed'] || '';
  var sold = tPrices[safeId + '_sold'] || '';
  var soldNum = parseFloat(sold) || 0;
  var sellNum = parseFloat(sell) || 0;
  var buyNum = parseFloat(buy) || 0;
  var listedNum2 = parseFloat(listed) || 0;
  var gain = (sellNum || buyNum) ? Math.round((soldNum * sellNum) - (listedNum2 * buyNum)) : 0;
  h += '<div class="tsales">';
  h += '<div class="tsales-group"><div class="tsales-label">Mises en vente</div>';
  h += '<input class="tsales-input" type="number" placeholder="0" min="0" value="' + listed + '"';
  h += ' oninput="setTSales(this)" data-key="' + safeId + '" data-type="listed"></div>';
  h += '<div class="tsales-group"><div class="tsales-label">Vendus</div>';
  h += '<input class="tsales-input" type="number" placeholder="0" min="0" value="' + sold + '"';
  h += ' oninput="setTSales(this)" data-key="' + safeId + '" data-type="sold"></div>';
  var gainCls2 = gain > 0 ? 'pos' : gain < 0 ? 'neg' : 'zero';
  h += '<div class="tmargin-total tmargin ' + (soldNum > 0 && sellNum > 0 ? gainCls2 : '') + '">'
    + (soldNum > 0 && sellNum > 0 ? (gain > 0 ? '+' : '') + fmtK(gain) + ' k' : '') + '</div>';
  h += '</div>';
  h += '</div>';
  return h;
}

function refreshCard(key) {
  var card = document.getElementById('tc_' + key);
  if (!card) return;
  var buy = parseFloat(tPrices[key + '_buy'] || 0);
  var sell = parseFloat(tPrices[key + '_sell'] || 0);
  var sold = parseFloat(tPrices[key + '_sold'] || 0);
  var listed = parseFloat(tPrices[key + '_listed'] || 0);
  var perUnit = sell && buy ? Math.round(sell - buy) : null;
  var total = (sell && buy && (sold || listed)) ? Math.round((sold * sell) - (listed * buy)) : null;
  var unitEl = card.querySelector('.tmargin-unit');
  var totalEl = card.querySelector('.tmargin-total');
  if (unitEl) {
    if (perUnit !== null) {
      var cls = perUnit > 0 ? 'pos' : perUnit < 0 ? 'neg' : 'zero';
      unitEl.className = 'tmargin-unit tmargin ' + cls;
      unitEl.textContent = (perUnit > 0 ? '+' : '') + fmtK(perUnit) + ' k / unité';

function tCalcScores(){
  var cs=tItems.map(function(it){
    var cost=(it.trool/T_TRPT)*T_TICKET;
    var benef=it.kamas-cost;
    var roi=(it.kamas-cost)/cost*100;
    return {item:it,cost:cost,benef:benef,roi:roi};
  });
  var maxROI=Math.max.apply(null,cs.map(function(c){return c.roi;}));
  var maxV=Math.max.apply(null,cs.map(function(c){return c.item.ventes;}));
  return cs.map(function(c){
    var roiN=maxROI>0?(c.roi/maxROI)*100:0;
    var liqN=maxV>0?(c.item.ventes/maxV)*100:0;
    var score=Math.round(roiN*0.5+liqN*0.5);
    return Object.assign({},c,{score:score});
  });
}

function refreshTScores(){
  var cs=tCalcScores();
  var sorted=[].concat(cs).sort(function(a,b){return b.score-a.score;});
  var topName=sorted[0].item.name;
  cs.forEach(function(c,i){
    var isBest=c.item.name===topName;
    var b=tBadge(c.score,isBest?0:99);
    var benef=document.getElementById('tbenef_'+i);
    var score=document.getElementById('tscore_'+i);
    var verdict=document.getElementById('tverdict_'+i);
    if(benef) benef.innerHTML='<span class="'+(c.benef>=0?'pos':'neg')+'">'+(c.benef>=0?'+':'')+fmtK(c.benef/1000)+' k</span>';
    if(score) score.innerHTML='<div style="font-size:.82rem;font-weight:600">'+c.score+'/100</div><div class="tbar"><div class="tbar-fill" style="width:'+c.score+'%;background:var(--mauve)"></div></div>';
    if(verdict) verdict.innerHTML='<span class="tbadge" style="background:'+b[1]+';color:'+b[0]+'">'+b[2]+'</span>';
  });
}

function tBadge(score,rank){
  if(rank===0)return['var(--mantle)','var(--green)','★ Top pick'];
  if(score>=60)return['var(--mantle)','var(--mauve)','Très bien'];
  if(score>=30)return['var(--text)','var(--surface2)','Correct'];
  return['var(--mantle)','rgba(243,139,168,.5)','Éviter'];
}

function calcTSim(){
  var raw = document.getElementById('tSimBudget').value;
  var budget=(parseTei(raw)||0)*1000;
  if(!budget){document.getElementById('tSimTickets').textContent='';document.getElementById('tSimItems').innerHTML='';document.getElementById('tSimRes').innerHTML='';return;}
  var tickets=Math.floor(budget/T_TICKET);
  var trools=tickets*T_TRPT;
  document.getElementById('tSimTickets').textContent=fmtK(tickets)+' tickets → '+fmtK(trools)+' troolatons';

  // Ne re-render les lignes que si elles n'existent pas encore
  var container = document.getElementById('tSimItems');
  if(!container.dataset.budget || container.dataset.budget !== String(budget)){
    var html='<div style="margin:.7rem 0;display:flex;flex-direction:column;gap:5px;">';
    tItems.forEach(function(it,i){
      var canBuy=Math.floor(trools/it.trool);
      if(canBuy===0)return;
      html+='<div style="display:flex;align-items:center;gap:10px;">'
        +'<div style="font-size:.76rem;color:var(--subtext0);min-width:180px;">'+it.name+'</div>'
        +'<div style="font-size:.65rem;color:var(--overlay0);min-width:90px;">max '+fmtK(canBuy)+' unités</div>'
        +'<div style="font-size:.65rem;color:var(--overlay0);min-width:65px;">nb vendus :</div>'
        +'<input class="tei" type="text" inputmode="numeric" placeholder="0" value="'+(tSimSales[i]?fmtTei(tSimSales[i]):'')+'" oninput="tSimSales['+i+']=parseTei(this.value)||0;this.value=fmtTei(parseTei(this.value))||this.value;updateTSimRes('+budget+')">'
        +'</div>';
    });
    html+='</div>';
    container.innerHTML=html;
    container.dataset.budget=String(budget);
  }
  updateTSimRes(budget);
}

function updateTSimRes(budget){
  var trools=Math.floor(budget/T_TICKET)*T_TRPT;
  var totalGain=0;
  tItems.forEach(function(it,i){
    var canBuy=Math.floor(trools/it.trool);
    var sold=Math.min(tSimSales[i]||0,canBuy);
    totalGain+=sold*it.kamas;
  });
  var net=totalGain-budget;
  document.getElementById('tSimRes').innerHTML=
    '<div class="tsim-stat"><div class="tstat-v '+(net>=0?'pos':'neg')+'">'+(net>=0?'+':'')+fmtK(net/1000)+' k</div><div class="tstat-l">Bilan net</div></div>'
    +'<div class="tsim-stat"><div class="tstat-v" style="color:var(--blue)">'+fmtK(totalGain/1000)+' k</div><div class="tstat-l">Revenus</div></div>'
    +'<div class="tsim-stat"><div class="tstat-v" style="color:var(--subtext0)">'+fmtK(budget/1000)+' k</div><div class="tstat-l">Investi</div></div>';
}

var recapDone = {};

function saveRecapDone(){ try { localStorage.setItem('alm_rd', JSON.stringify(recapDone)); } catch(e) {} triggerAutoSave(); }

function recapDoneKey(name){ return recapY+'-'+pad(recapM+1)+'::'+name; }

function toggleRecapDone(name){
  var k = recapDoneKey(name);
  recapDone[k] = !recapDone[k];
  saveRecapDone();
  var cards = document.querySelectorAll('.recap-card');
  cards.forEach(function(card){
    if(card.dataset.name === name){
      card.classList.toggle('done', recapDone[k]);

}

function renderRecap(){
  var el = document.getElementById('recapContent');
  el.innerHTML = '<div class="recap-toolbar">'
    +'<div class="recap-month-nav">'
    +'<button class="nbtn" onclick="recapNav(-1)">&#9664;</button>'
    +'<div class="recap-month-label" id="recapMonthLbl"></div>'
    +'<button class="nbtn" onclick="recapNav(1)">&#9654;</button>'

    +'</div>'

    +'<label>Nombre de persos :</label>'
    +'<input type="number" id="recapPersoInput" min="1" max="99" value="'+recapPerso+'" oninput="recapPerso=Math.max(1,parseInt(this.value)||1);loadRecapData()">'

    +'<div id="recapStatsWrap"></div>'

function recapNav(d){
  recapM += d;
  if(recapM > 11){ recapM = 0; recapY++; }
  if(recapM < 0){ recapM = 11; recapY--; }
  document.getElementById('recapMonthLbl').textContent = MO[recapM] + ' ' + recapY;
  loadRecapData();
}

function recapGoToday(){
  recapY = tod.getFullYear(); recapM = tod.getMonth();
  document.getElementById('recapMonthLbl').textContent = MO[recapM] + ' ' + recapY;
  loadRecapData();
}

function loadRecapData(){
  var body = document.getElementById('recapBody');
  var progressWrap = document.getElementById('recapProgressWrap');
  var statsWrap = document.getElementById('recapStatsWrap');
  if(!body) return;

  // Générer tous les jours du mois
  var daysInMonth = new Date(recapY, recapM + 1, 0).getDate();
  var dates = [];
  for(var i = 1; i <= daysInMonth; i++){
    var d = new Date(recapY, recapM, i);
    dates.push({ date: d, ds: fmt(d) });
  }

  // Afficher progression
  body.innerHTML = '<div class="recap-loading"><div class="spin"></div>Chargement des '+daysInMonth+' jours...</div>';
  progressWrap.innerHTML = '';
  statsWrap.innerHTML = '';

  var loaded = 0;
  var results = new Array(dates.length).fill(null);

  function updateProgress(){
    loaded++;
    var pct = Math.round(loaded / dates.length * 100);
    progressWrap.innerHTML = '<div class="recap-progress">'
      +'<div class="recap-progress-bar-wrap"><div class="recap-progress-bar" style="width:'+pct+'%"></div></div>'
      +'<div class="recap-progress-lbl">'+loaded+' / '+dates.length+' jours</div>'
      +'</div>';
    if(loaded === dates.length) buildRecapView(dates, results);
  }

  dates.forEach(function(entry, idx){
    fetchDay(entry.ds).then(function(data){
      results[idx] = data;
      updateProgress();
    }).catch(function(){
      results[idx] = null;
      updateProgress();
    });
  });
}

function buildRecapView(dates, results){
  var body = document.getElementById('recapBody');
  var statsWrap = document.getElementById('recapStatsWrap');
  var progressWrap = document.getElementById('recapProgressWrap');
  var todDs = fmt(tod);

  // Agréger les ressources
  var resources = {}; // key = item name
  var totalDays = 0, totalQty = 0, uniqueItems = 0;

  dates.forEach(function(entry, idx){
    var data = results[idx];
    if(!data) return;
    totalDays++;
    var item = (data.tribute && data.tribute.item) || {};
    var qty = (data.tribute && data.tribute.quantity) || 1;
    var name = item.name || '—';
    var img = (item.image_urls && item.image_urls.icon) || '';
    var bName = (data.bonus && data.bonus.type && data.bonus.type.name) || '';
    var bDesc = (data.bonus && data.bonus.description) || '';
    var tags = classify(bDesc, bName);
    var cat = getCat(tags[0]);

    totalQty += qty;
    if(!resources[name]){
      uniqueItems++;
      resources[name] = { name:name, img:img, qty:0, dates:[], cat:cat, tags:tags };
    }
    resources[name].qty += qty;
    resources[name].dates.push({ ds: entry.ds, date: entry.date, qty: qty });
  });

  // Supprimer la barre de progression
  progressWrap.innerHTML = '';

  // Stats globales
  var isCurrentMonth = (recapY === tod.getFullYear() && recapM === tod.getMonth());
  statsWrap.innerHTML = '<div class="recap-stats">'
    +'<div class="recap-stat"><div class="recap-stat-v" style="color:var(--mauve)">'+totalDays+'</div><div class="recap-stat-l">Jours chargés</div></div>'
    +'<div class="recap-stat"><div class="recap-stat-v" style="color:var(--blue)">'+(uniqueItems)+'</div><div class="recap-stat-l">Ressources uniques</div></div>'
    +'<div class="recap-stat"><div class="recap-stat-v" style="color:var(--peach)">'+(totalQty * recapPerso).toLocaleString('fr-FR')+'</div><div class="recap-stat-l">Offrandes totales × '+recapPerso+'</div></div>'
    +'</div>';

  // Trier par première date d'apparition dans le mois
  var sorted = Object.values(resources).sort(function(a,b){
    return a.dates[0].date - b.dates[0].date;
  });

  if(sorted.length === 0){
    body.innerHTML = '<div class="recap-empty">Aucune donnée disponible pour ce mois.</div>';
    return;
  }

  // Construire les lignes compactes
  var html = '<div class="recap-grid">';
  var JOURS_COURTS = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];

  sorted.forEach(function(r){
    var totalForPerso = r.qty * recapPerso;
    var imgHtml = r.img
      ? '<img src="'+r.img+'" style="width:26px;height:26px;image-rendering:pixelated;border-radius:4px;" alt="">'
      : '<span style="font-size:.9rem;opacity:.3">&#9876;</span>';

    // Première catégorie seulement (plus compact)
    var c = getCat(r.tags[0]);
    var tagHtml = '<span style="font-size:.55rem;font-weight:600;padding:1px 5px;border-radius:3px;color:'+c.fg+';background:'+c.bg+';white-space:nowrap">'+c.label+'</span>';

    // Pills de dates compactes
    var pillsHtml = '';
    r.dates.forEach(function(e){
      var isToday = e.ds === todDs;
      var isPast = e.date < tod && !isToday;
      var cls = 'recap-date-pill'+(isToday?' today':isPast?' past':'');
      var dayLabel = JOURS_COURTS[e.date.getDay()]+' '+e.date.getDate();
      pillsHtml += '<span class="'+cls+'" onclick="sel(\''+e.ds+'\');setView(\'cal\')" title="'+fmtFRDay(e.date)+' — '+e.qty+'x">'+dayLabel+'</span>';
    });

    var isDone = !!recapDone[recapY+'-'+pad(recapM+1)+'::'+r.name];
    var safeName = r.name.replace(/'/g,"\\'");

    html += '<div class="recap-card'+(isDone?' done':'')+'" data-name="'+r.name.replace(/"/g,'&quot;')+'" onclick="toggleRecapDone(\''+safeName+'\')" style="cursor:pointer">'
      +'<div style="display:flex;align-items:center;gap:.5rem;">'
      +'<div style="width:32px;height:32px;background:var(--base);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0">'
      +(r.img ? '<img src="'+r.img+'" style="width:28px;height:28px;image-rendering:pixelated;" alt="">' : '<span style="font-size:1rem;opacity:.3">&#9876;</span>')
      +'</div>'
      +'<div style="flex:1;min-width:0;overflow:hidden">'
      +'<div class="recap-card-name" style="font-size:.78rem;line-height:1.3;word-break:break-word">'+r.name+'</div>'
      +'<div style="display:flex;align-items:center;gap:3px;margin-top:2px">'
      +'<span style="font-size:.54rem;font-weight:600;padding:1px 5px;border-radius:3px;color:'+c.fg+';background:'+c.bg+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px">'+c.label+'</span>'
      +(recapPerso > 1 ? '<span style="font-size:.58rem;color:var(--overlay0);white-space:nowrap">'+r.qty+'×'+recapPerso+'</span>' : '<span style="font-size:.58rem;color:var(--overlay0)">'+r.dates.length+'j</span>')
      +'</div>'
      +'</div>'
      +'<div style="text-align:right;flex-shrink:0;max-width:54px;min-width:0">'
      +'<div class="recap-card-qty" style="font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">×'+totalForPerso.toLocaleString('fr-FR')+'</div>'
      +'</div>'
      +'</div>'
      +'<div class="recap-dates-wrap" onclick="event.stopPropagation()">'+pillsHtml+'</div>'
      +'</div>';
  });

  html += '</div>';
  body.innerHTML = html;
}

function renderOcre(){
  if(!ocreData) ocreData = OCRE_DATA;
  buildOcreView();
}

function ocreStats(){
  if(!ocreData) return {total:0,captured:0,archis:0,archisCapt:0,boss:0,bossCapt:0,normal:0,normalCapt:0};
  var total=0,captured=0,archis=0,archisCapt=0,boss=0,bossCapt=0,normal=0,normalCapt=0;
  ocreData.forEach(function(m){
    total++;
    var capt = !!ocreCaptured[m.id];
    if(capt) captured++;
    var t = (typeof m.type === 'string') ? m.type : (m.type && m.type.name && m.type.name.fr)||'';
    if(t==='archimonstre'){archis++;if(capt)archisCapt++;}
    else if(t==='boss'){boss++;if(capt)bossCapt++;}
    else{normal++;if(capt)normalCapt++;}
  });
  return {total:total,captured:captured,archis:archis,archisCapt:archisCapt,boss:boss,bossCapt:bossCapt,normal:normal,normalCapt:normalCapt};
}

function buildOcreView(){
  var el = document.getElementById('ocreContent');
  var s = ocreStats();
  var pct = s.total > 0 ? Math.round(s.captured/s.total*100) : 0;

  // Grouper par étape
  var byStep = {};
  ocreData.forEach(function(m){
    var step = m.step || 1;
    if(!byStep[step]) byStep[step] = [];
    byStep[step].push(m);
  });
  var steps = Object.keys(byStep).map(Number).sort(function(a,b){return a-b;});

  // Filtrer
  var filtered = ocreData.filter(function(m){
    var t = (typeof m.type === 'string') ? m.type : (m.type && m.type.name && m.type.name.fr)||'';
    if(ocreFilter !== 'all' && t.toLowerCase() !== ocreFilter) return false;
    if(!ocreShowAll && ocreCaptured[m.id]) return false;
    if(ocreSearch){
      var name = (typeof m.name === 'string') ? m.name : (m.name && m.name.fr)||'';
      if(name.toLowerCase().indexOf(ocreSearch.toLowerCase()) === -1) return false;
    }
    return true;
  });

  // Regrouper filtrés par étape
  var filtByStep = {};
  filtered.forEach(function(m){
    var step = m.step || 1;
    if(!filtByStep[step]) filtByStep[step] = [];
    filtByStep[step].push(m);
  });

  var html = '';

  // Toolbar
  html += '<div class="ocre-toolbar">'
    +'<div class="swrap"><svg viewBox="0 0 24 24" style="position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;fill:none;stroke:var(--overlay0);stroke-width:2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>'
    +'<input class="ocre-search sinput" placeholder="Rechercher un monstre..." oninput="ocreSearch=this.value;buildOcreView()" value="'+ocreSearch+'"></div>'
    +'<div class="ocre-filters">'
    +'<div class="ocre-chip'+(ocreFilter==='all'?' on':'')+'" onclick="ocreFilter=\'all\';buildOcreView()">Tous ('+s.total+')</div>'
    +'<div class="ocre-chip'+(ocreFilter==='archimonstre'?' on':'')+'" onclick="ocreFilter=\'archimonstre\';buildOcreView()" style="'+(ocreFilter==='archimonstre'?'background:rgba(203,166,247,.8);color:var(--mantle)':'')+'">⚡ Archis ('+s.archis+')</div>'
    +'<div class="ocre-chip'+(ocreFilter==='boss'?' on':'')+'" onclick="ocreFilter=\'boss\';buildOcreView()" style="'+(ocreFilter==='boss'?'background:rgba(243,139,168,.8);color:var(--mantle)':'')+'">💀 Boss ('+s.boss+')</div>'
    +'</div>'
    +'<label style="display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--subtext0);cursor:pointer;margin-left:auto">'
    +'<input type="checkbox" '+(ocreShowAll?'':'checked')+' onchange="ocreShowAll=!this.checked;buildOcreView()"> Masquer capturés'
    +'</label>'
    +'</div>';

  // Progress bar
  html += '<div class="ocre-progress-wrap">'
    +'<div class="ocre-progress-bar-wrap"><div class="ocre-progress-bar" style="width:'+pct+'%"></div></div>'
    +'<div class="ocre-progress-lbl">'+s.captured+' / '+s.total+' — '+pct+'%</div>'
    +'</div>';

  // Stats
  html += '<div class="ocre-stats" style="grid-template-columns:repeat(3,1fr)">'
    +'<div class="ocre-stat"><div class="ocre-stat-v" style="color:var(--mauve)">'+pct+'%</div><div class="ocre-stat-l">Progression</div></div>'
    +'<div class="ocre-stat"><div class="ocre-stat-v" style="color:var(--mauve)">'+s.archisCapt+' / '+s.archis+'</div><div class="ocre-stat-l">⚡ Archimonstres</div></div>'
    +'<div class="ocre-stat"><div class="ocre-stat-v" style="color:var(--red)">'+s.bossCapt+' / '+s.boss+'</div><div class="ocre-stat-l">💀 Boss</div></div>'
    +'</div>';

  // Par étape
  var visibleSteps = steps.filter(function(step){ return filtByStep[step] && filtByStep[step].length > 0; });

  if(visibleSteps.length === 0){
    html += '<div style="text-align:center;padding:3rem;color:var(--overlay0)">Aucun monstre à afficher.</div>';
  } else {
    visibleSteps.forEach(function(step){
      var mons = filtByStep[step];
      var stepAll = byStep[step] || [];
      var stepCapt = stepAll.filter(function(m){ return ocreCaptured[m.id]; }).length;
      var stepDone = stepCapt === stepAll.length;

      html += '<div class="ocre-step-title">Étape <span>'+step+'</span>'
        +'<span class="step-prog">('+stepCapt+'/'+stepAll.length+')</span>'
        +(stepDone?'<span style="color:var(--green);font-size:.65rem">✓ Complète</span>':'')
        +'</div>';

      html += '<div class="ocre-grid">';
      mons.forEach(function(m){
        var name = (typeof m.name === 'string') ? m.name : (m.name && m.name.fr) || '?';
        var type = (typeof m.type === 'string') ? m.type : (m.type && m.type.name && m.type.name.fr) || '';
        var img = OCRE_IMG_MAPPING[m.name] ? ocreImgUrl(OCRE_IMG_MAPPING[m.name]) : ocreImgUrl(m.name);
        var capt = !!ocreCaptured[m.id];
        var typeBg = type==='archimonstre'?'rgba(203,166,247,.25)':type==='boss'?'rgba(243,139,168,.25)':'rgba(137,180,250,.2)';
        var typeFg = type==='archimonstre'?'var(--mauve)':type==='boss'?'var(--red)':'var(--blue)';
        var typeLabel = type==='archimonstre'?'⚡ Archi':type==='boss'?'💀 Boss':'🐾 Monstre';

        html += '<div class="ocre-card'+(capt?' captured':'')+'" onclick="toggleOcreCapture('+m.id+')">'
          +'<div class="ocre-card-img">'
          +'<img src="'+img+'" style="width:32px;height:32px;image-rendering:pixelated;" alt="" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'inline\'">'
          +'<span style="opacity:.25;font-size:1.1rem;display:none">👾</span>'
          +'</div>'
          +'<div class="ocre-card-info">'
          +'<div class="ocre-name">'+name+'</div>'
          +'<div class="ocre-type-badge" style="background:'+typeBg+';color:'+typeFg+'">'+typeLabel+'</div>'
          +'</div>'
          +'<div class="ocre-check">'+(capt?'✓':'')+'</div>'
          +'</div>';
      });
      html += '</div>';
    });
  }

  el.innerHTML = html;
}

function toggleOcreCapture(id){
  if(ocreCaptured[id]) delete ocreCaptured[id];
  else ocreCaptured[id] = true;
  saveOcre();
  buildOcreView();
}

  var sidebarHtml = ids.map(function(id){
    var n = notes[id];
    var preview = (n.body||'').replace(/\n/g,' ').trim();
    return '<div class="note-item'+(id===activeNoteId?' active':'')+'" onclick="selectNote(\''+id+'\')">'
      +'<div class="note-item-title">'+(escapeHtml(n.title)||'Sans titre')+'</div>'
      +'<div class="note-item-preview">'+(escapeHtml(preview.slice(0,60))||'<em style="color:var(--overlay0)">Vide</em>')+'</div>'
      +'<div class="note-item-date">'+fmtNoteDate(n.updated)+'</div>'
      +'</div>';
  }).join('');
  var editorHtml = '';
  if(activeNoteId && notes[activeNoteId]){
    var n = notes[activeNoteId];
    editorHtml = '<div style="height:100%;display:flex;flex-direction:column;gap:8px">'
      +'<div class="notes-editor-top">'
      +'<input class="notes-title-input" id="noteTitleInput" value="'+escapeHtml(n.title||'')+'" placeholder="Titre de la note..." oninput="updateNoteTitle(this.value)">'
      +'<span class="notes-save-indicator saved" id="notesSaveInd">✓ Sauvegardé</span>'
      +'<button class="notes-delete-btn" onclick="deleteNote(\''+activeNoteId+'\')">🗑 Supprimer</button>'
      +'</div>'
      +'<textarea class="notes-textarea" id="noteBodyInput" placeholder="Écris tes notes ici..." oninput="updateNoteBody(this.value)">'+escapeHtml(n.body||'')+'</textarea>'
      +'</div>';
  } else {
    editorHtml = '<div class="notes-empty">📝<span>Crée une note pour commencer</span></div>';
  }
  el.innerHTML = '<div class="notes-layout">'
    +'<div class="notes-sidebar">'
    +'<button class="notes-new-btn" onclick="newNote()">+ Nouvelle note</button>'
    +'<div class="notes-list">'+sidebarHtml+'</div>'
    +'</div>'
    +'<div style="min-height:0;display:flex;flex-direction:column">'+editorHtml+'</div>'
    +'</div>';
}

function newNote(){
  var id = noteId();
  notes[id] = { title:'', body:'', created:Date.now(), updated:Date.now() };
  activeNoteId = id; saveNotes(); renderNotes();
  var t = document.getElementById('noteTitleInput'); if(t) t.focus();
}

function selectNote(id){ activeNoteId = id; renderNotes(); }

function updateNoteTitle(val){
  if(!activeNoteId) return;
  notes[activeNoteId].title = val; notes[activeNoteId].updated = Date.now();
  scheduleNotesSave();
}

function updateNoteBody(val){
  if(!activeNoteId) return;
  notes[activeNoteId].body = val; notes[activeNoteId].updated = Date.now();
  scheduleNotesSave();
}

function scheduleNotesSave(){
  var ind = document.getElementById('notesSaveInd');
  if(ind){ ind.textContent='…'; ind.classList.remove('saved'); }
  clearTimeout(notesSaveDebounce);
  notesSaveDebounce = setTimeout(function(){
    saveNotes();
    var ind2 = document.getElementById('notesSaveInd');
    if(ind2){ ind2.textContent='✓ Sauvegardé'; ind2.classList.add('saved'); }
  }, 600);
}

function deleteNote(id){
  if(!confirm('Supprimer cette note ?')) return;
  delete notes[id]; if(activeNoteId===id) activeNoteId=null;
  saveNotes(); renderNotes();
}

var SAVE_KEYS = ['alm_mylist','alm_n','alm_td','alm_ti','alm_tp','alm_rd','alm_notes','alm_ocre'];
var _fsHandle = null, _fsDebounce = null, _fsSaving = false;

function _buildSavePayload(){
  var save = { version: 1, date: new Date().toISOString(), data: {} };
  SAVE_KEYS.forEach(function(k){ var v=localStorage.getItem(k); if(v!==null) save.data[k]=v; });
  return JSON.stringify(save, null, 2);
}

function _setSaveStatus(s){
  var el = document.getElementById('saveStatus');
  if(!el) return;
  if(s==='ok')      { el.textContent='✅ Sauvegardé'; el.style.color='var(--green)'; }
  else if(s==='saving') { el.textContent='🔄...'; el.style.color='var(--yellow)'; }
  else if(s==='err')    { el.textContent='❌ Erreur'; el.style.color='var(--red)'; }
  else if(s==='linked') { el.textContent='📁 Lié'; el.style.color='var(--blue)'; }
}

async function linkSaveFile(){
  try {
    if(!window.showSaveFilePicker){ toast('❌ Non supporté (utilise Chrome/Edge)'); return; }
    _fsHandle = await window.showSaveFilePicker({
      suggestedName: 'blaze-tools-save.json',
      types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
    });
    _setSaveStatus('linked');
    toast('📁 Fichier lié — sauvegarde auto activée !');
    await _writeToFile();
  } catch(e) { if(e.name!=='AbortError') toast('❌ Erreur : '+e.message); }
}

async function _writeToFile(){
  if(!_fsHandle || _fsSaving) return;
  _fsSaving = true; _setSaveStatus('saving');
  try {
    var writable = await _fsHandle.createWritable();
    await writable.write(_buildSavePayload());
    await writable.close();
    _setSaveStatus('ok');
  } catch(e) { _setSaveStatus('err'); toast('❌ Sauvegarde échouée : '+e.message); }
  _fsSaving = false;
}

function triggerAutoSave(){
  if(!_fsHandle) return;
  clearTimeout(_fsDebounce);
  _fsDebounce = setTimeout(_writeToFile, 600);
}

function exportData(){
  try {
    var save = { version: 1, date: new Date().toISOString(), data: {} };
    SAVE_KEYS.forEach(function(k){
      var v = localStorage.getItem(k);
      if(v !== null) save.data[k] = v;
    });
    var blob = new Blob([JSON.stringify(save, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    var d = new Date();
    a.download = 'blaze-tools-' + d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('✅ Sauvegarde téléchargée !');
  } catch(e) { toast('❌ Erreur export : ' + e.message); }
}

function importData(event){
  var file = event.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var save = JSON.parse(e.target.result);
      if(!save || !save.data) throw new Error('Format invalide');
      var count = 0;
      Object.keys(save.data).forEach(function(k){
        if(SAVE_KEYS.indexOf(k) !== -1) {
          localStorage.setItem(k, save.data[k]);
          count++;
        }
      });
      toast('✅ ' + count + ' entrées restaurées — rechargement...');
      setTimeout(function(){ location.reload(); }, 1500);
    } catch(e) { toast('❌ Erreur import : ' + e.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}
