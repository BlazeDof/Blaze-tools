function getStoneSize(lvl){
  if(lvl <= 50) return {name:'Petite', color:'var(--green)', bg:'rgba(166,227,161,.15)', rank:0};
  if(lvl <= 100) return {name:'Moyenne', color:'var(--blue)', bg:'rgba(137,180,250,.15)', rank:1};
  if(lvl <= 150) return {name:'Grande', color:'var(--yellow)', bg:'rgba(249,226,175,.15)', rank:2};
  if(lvl <= 200) return {name:'Énorme', color:'var(--peach)', bg:'rgba(250,179,135,.15)', rank:3};
  return {name:'Gigantesque', color:'var(--red)', bg:'rgba(243,139,168,.15)', rank:4};
}

var STONE_SIZES = [
  {name:'Petite', maxLvl:50, color:'var(--green)', bg:'rgba(166,227,161,.15)'},
  {name:'Moyenne', maxLvl:100, color:'var(--blue)', bg:'rgba(137,180,250,.15)'},
  {name:'Grande', maxLvl:150, color:'var(--yellow)', bg:'rgba(249,226,175,.15)'},
  {name:'Énorme', maxLvl:200, color:'var(--peach)', bg:'rgba(250,179,135,.15)'},
  {name:'Gigantesque', maxLvl:9999, color:'var(--red)', bg:'rgba(243,139,168,.15)'}
];

var stonePrices = {};
try { stonePrices = JSON.parse(localStorage.getItem('alm_ocre_stone_prices') || '{}'); } catch(e){}
function saveStonePrices(){ try { localStorage.setItem('alm_ocre_stone_prices', JSON.stringify(stonePrices)); } catch(e){} triggerAutoSave(); }

function getBestStone(lvl){
  var minRank = getStoneSize(lvl).rank;
  var best = null;
  var bestPrice = Infinity;
  for(var i = minRank; i < STONE_SIZES.length; i++){
    var s = STONE_SIZES[i];
    var price = stonePrices[s.name];
    if(price !== undefined && price !== null && price !== '' && Number(price) >= 0){
      if(Number(price) < bestPrice){
        bestPrice = Number(price);
        best = s;
      }
    }
  }
  if(!best) return STONE_SIZES[minRank];
  return best;
}

function hasStonePrices(){
  return Object.keys(stonePrices).some(function(k){ return stonePrices[k] !== undefined && stonePrices[k] !== '' && Number(stonePrices[k]) > 0; });
}





function renderOcre(){
  if(!ocreData) ocreData = OCRE_DATA;
  buildOcreView();
}

function ocreStats(){
  if(!ocreData) return {total:0,captured:0,archis:0,archisCapt:0,boss:0,bossCapt:0,normal:0,normalCapt:0};
  var total=0,captured=0,archis=0,archisCapt=0,boss=0,bossCapt=0,normal=0,normalCapt=0;
  ocreData.forEach(function(m){
    total++;
    var capt = !!ocreCaptured[m.id];
    if(capt) captured++;
    var t = (typeof m.type === 'string') ? m.type : (m.type && m.type.name && m.type.name.fr)||'';
    if(t==='archimonstre'){archis++;if(capt)archisCapt++;}
    else if(t==='boss'){boss++;if(capt)bossCapt++;}
    else{normal++;if(capt)normalCapt++;}
  });
  return {total:total,captured:captured,archis:archis,archisCapt:archisCapt,boss:boss,bossCapt:bossCapt,normal:normal,normalCapt:normalCapt};
}

function buildOcreView(){
  var el = document.getElementById('ocreContent');
  var s = ocreStats();
  var pct = s.total > 0 ? Math.round(s.captured/s.total*100) : 0;

  // Grouper par étape
  var byStep = {};
  ocreData.forEach(function(m){
    var step = m.step || 1;
    if(!byStep[step]) byStep[step] = [];
    byStep[step].push(m);
  });
  var steps = Object.keys(byStep).map(Number).sort(function(a,b){return a-b;});

  // Filtrer
  var filtered = ocreData.filter(function(m){
    var t = (typeof m.type === 'string') ? m.type : (m.type && m.type.name && m.type.name.fr)||'';
    if(ocreStep !== 0 && m.step !== ocreStep) return false;
    if(ocreFilter !== 'all' && t.toLowerCase() !== ocreFilter) return false;
    if(!ocreShowAll && ocreCaptured[m.id]) return false;
    if(ocreSearch){
      var name = (typeof m.name === 'string') ? m.name : (m.name && m.name.fr)||'';
      if(name.toLowerCase().indexOf(ocreSearch.toLowerCase()) === -1) return false;
    }
    return true;
  });

  // Regrouper filtrés par étape
  var filtByStep = {};
  filtered.forEach(function(m){
    var step = m.step || 1;
    if(!filtByStep[step]) filtByStep[step] = [];
    filtByStep[step].push(m);
  });

  var html = '';

  // Perso selector bar
  var activePerso = ocrePersos.find(function(p){return p.id===ocreActivePersoId;});
  var persoOpts = '';
  ocrePersos.forEach(function(p){
    persoOpts += '<option value="'+p.id+'"'+(p.id===ocreActivePersoId?' selected':'')+'>'+p.name+(p.classe?' ('+p.classe+')':'')+'</option>';
  });
  html += '<div class="ocre-perso-bar">'
    +'<span class="ocre-perso-label">Personnage</span>'
    +'<select class="ocre-perso-select" onchange="switchOcrePerso(this.value)">'+persoOpts+'</select>'
    +'<button class="ocre-perso-btn" onclick="showOcrePersoModal()">⚙️ Gérer</button>'
    +'<button class="ocre-perso-btn" onclick="showOcreManquants()" style="'+(ocreViewMode==='manquants'?'background:var(--mauve);color:var(--mantle);font-weight:600':'')+'">📋 Manquants</button>'
    +'<button class="ocre-perso-btn" onclick="showOcrePierres()" style="'+(ocreViewMode==='pierres'?'background:var(--mauve);color:var(--mantle);font-weight:600':'')+'">💰 Pierres</button>'
    +'</div>';

  // Si mode manquants, afficher cette vue et retourner
  if(ocreViewMode === 'manquants'){
    html += buildOcreManquantsView();
    el.innerHTML = html;
    return;
  }

  // Si mode pierres, afficher cette vue et retourner
  if(ocreViewMode === 'pierres'){
    html += buildOcrePierresView();
    el.innerHTML = html;
    return;
  }

  // Toolbar
  // Build step selector options
  var stepOpts = '<option value="0"'+(ocreStep===0?' selected':'')+'>Toutes les étapes</option>';
  steps.forEach(function(s2){ stepOpts += '<option value="'+s2+'"'+(ocreStep===s2?' selected':'')+'>Étape '+s2+' ('+( byStep[s2]||[]).length+')</option>'; });

  html += '<div class="ocre-toolbar">'
    +'<div class="swrap"><svg viewBox="0 0 24 24" style="position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;fill:none;stroke:var(--overlay0);stroke-width:2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>'
    +'<input class="ocre-search sinput" placeholder="Rechercher un monstre..." oninput="ocreSearch=this.value;buildOcreView()" value="'+ocreSearch+'"></div>'
    +'<select style="background:var(--surface0);border:none;color:var(--text);padding:.15rem .6rem;border-radius:var(--radius-sm);font-size:.75rem;height:30px;outline:none;cursor:pointer;font-family:Inter,sans-serif" onchange="ocreStep=parseInt(this.value);buildOcreView()">'+stepOpts+'</select>'
    +'<div class="ocre-filters">'
    +'<div class="ocre-chip'+(ocreFilter==='all'?' on':'')+'" onclick="ocreFilter=\'all\';buildOcreView()">Tous ('+s.total+')</div>'
    +'<div class="ocre-chip'+(ocreFilter==='archimonstre'?' on':'')+'" onclick="ocreFilter=\'archimonstre\';buildOcreView()" style="'+(ocreFilter==='archimonstre'?'background:rgba(203,166,247,.8);color:var(--mantle)':'')+'">⚡ Archis ('+s.archis+')</div>'
    +'<div class="ocre-chip'+(ocreFilter==='boss'?' on':'')+'" onclick="ocreFilter=\'boss\';buildOcreView()" style="'+(ocreFilter==='boss'?'background:rgba(243,139,168,.8);color:var(--mantle)':'')+'">💀 Boss ('+s.boss+')</div>'
    +'</div>'
    +'<label style="display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--subtext0);cursor:pointer;margin-left:auto">'
    +'<input type="checkbox" '+(ocreShowAll?'':'checked')+' onchange="ocreShowAll=!this.checked;buildOcreView()"> Masquer capturés'
    +'</label>'
    +'</div>';

  // Progress bar
  html += '<div class="ocre-progress-wrap">'
    +'<div class="ocre-progress-bar-wrap"><div class="ocre-progress-bar" style="width:'+pct+'%"></div></div>'
    +'<div class="ocre-progress-lbl">'+s.captured+' / '+s.total+' — '+pct+'%</div>'
    +'</div>';

  // Stats
  html += '<div class="ocre-stats" style="grid-template-columns:repeat(3,1fr)">'
    +'<div class="ocre-stat"><div class="ocre-stat-v" style="color:var(--mauve)">'+pct+'%</div><div class="ocre-stat-l">Progression</div></div>'
    +'<div class="ocre-stat"><div class="ocre-stat-v" style="color:var(--mauve)">'+s.archisCapt+' / '+s.archis+'</div><div class="ocre-stat-l">⚡ Archimonstres</div></div>'
    +'<div class="ocre-stat"><div class="ocre-stat-v" style="color:var(--red)">'+s.bossCapt+' / '+s.boss+'</div><div class="ocre-stat-l">💀 Boss</div></div>'
    +'</div>';

  // Résumé pierres d'âme nécessaires (monstres non capturés)
  var stoneCount = {};
  ocreData.forEach(function(m){
    if(!ocreCaptured[m.id]){
      var st = getStoneSize(m.level_max);
      if(!stoneCount[st.name]) stoneCount[st.name] = {count:0, color:st.color, bg:st.bg, img:st.img};
      stoneCount[st.name].count++;
    }
  });
  var stoneKeys = ['Petite','Moyenne','Grande','Énorme','Gigantesque'];
  var stoneHtml = '';
  stoneKeys.forEach(function(k){
    if(stoneCount[k] && stoneCount[k].count > 0){
      stoneHtml += '<span style="font-size:.62rem;font-weight:600;padding:3px 8px;border-radius:4px;background:'+stoneCount[k].bg+';color:'+stoneCount[k].color+'"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+stoneCount[k].color+';vertical-align:middle;margin-right:4px;opacity:.7"></span>'+k+' ×'+stoneCount[k].count+'</span>';
    }
  });
  if(stoneHtml){
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;align-items:center">'
      +'<span style="font-size:.58rem;color:var(--overlay0);font-weight:600;text-transform:uppercase;letter-spacing:.08em">Pierres nécessaires</span>'
      +stoneHtml
      +'</div>';
  }

  // Par étape
  var visibleSteps = steps.filter(function(step){ return filtByStep[step] && filtByStep[step].length > 0; });

  if(visibleSteps.length === 0){
    html += '<div style="text-align:center;padding:3rem;color:var(--overlay0)">Aucun monstre à afficher.</div>';
  } else {
    visibleSteps.forEach(function(step){
      var mons = filtByStep[step];
      var stepAll = byStep[step] || [];
      var stepCapt = stepAll.filter(function(m){ return ocreCaptured[m.id]; }).length;
      var stepDone = stepCapt === stepAll.length;

      html += '<div class="ocre-step-title">Étape <span>'+step+'</span>'
        +'<span class="step-prog">('+stepCapt+'/'+stepAll.length+')</span>'
        +(stepDone?'<span style="color:var(--green);font-size:.65rem">✓ Complète</span>':'')
        +'<span style="flex:1;height:1px;background:var(--surface0)"></span>'
        +'<button class="ocre-step-toggle" onclick="event.stopPropagation();toggleOcreStep('+step+')" title="'+(stepDone?'Décocher':'Cocher')+' toute l\'étape">'+(stepDone?'✕ Décocher':'✓ Tout cocher')+'</button>'
        +'</div>';

      html += '<div class="ocre-grid">';
      mons.forEach(function(m){
        var name = (typeof m.name === 'string') ? m.name : (m.name && m.name.fr) || '?';
        var type = (typeof m.type === 'string') ? m.type : (m.type && m.type.name && m.type.name.fr) || '';
        var img = ocreImgUrl(m.name);
        var capt = !!ocreCaptured[m.id];
        var typeBg = type==='archimonstre'?'rgba(203,166,247,.25)':type==='boss'?'rgba(243,139,168,.25)':'rgba(137,180,250,.2)';
        var typeFg = type==='archimonstre'?'var(--mauve)':type==='boss'?'var(--red)':'var(--blue)';
        var typeLabel = type==='archimonstre'?'⚡ Archi':type==='boss'?'💀 Boss':'🐾 Monstre';
        var lvl = m.level_min === m.level_max ? 'Niv. '+m.level_min : 'Niv. '+m.level_min+'-'+m.level_max;
        var stone = getStoneSize(m.level_max);

        html += '<div class="ocre-card'+(capt?' captured':'')+'" onclick="toggleOcreCapture('+m.id+')">'
          +'<div class="ocre-card-img">'
          +'<img src="'+img+'" style="width:32px;height:32px;image-rendering:pixelated;" alt="" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'inline\'">'
          +'<span style="opacity:.25;font-size:1.1rem;display:none">👾</span>'
          +'</div>'
          +'<div class="ocre-card-info">'
          +'<div class="ocre-name">'+name+'</div>'
          +'<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">'
          +'<div class="ocre-type-badge" style="background:'+typeBg+';color:'+typeFg+'">'+typeLabel+'</div>'
          +'<span style="font-size:.5rem;color:var(--overlay1)">'+lvl+'</span>'
          +'</div>'
          +'<div style="font-size:.48rem;color:'+stone.color+';margin-top:1px"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+stone.color+';vertical-align:middle;margin-right:3px;opacity:.7"></span>'+stone.name+'</div>'
          +'</div>'
          +'<div class="ocre-check">'+(capt?'✓':'')+'</div>'
          +'</div>';
      });
      html += '</div>';
    });
  }

  el.innerHTML = html;
}

function toggleOcreCapture(id){
  if(ocreCaptured[id]) delete ocreCaptured[id];
  else ocreCaptured[id] = true;
  saveOcre();
  buildOcreView();
}
function toggleOcreStep(step){
  if(!ocreData) return;
  var mons = ocreData.filter(function(m){ return m.step === step; });
  var allDone = mons.every(function(m){ return !!ocreCaptured[m.id]; });
  mons.forEach(function(m){
    if(allDone) delete ocreCaptured[m.id];
    else ocreCaptured[m.id] = true;
  });
  saveOcre();
  buildOcreView();
  toast(allDone ? '↩️ Étape '+step+' décochée' : '✅ Étape '+step+' complète !');
}

function showOcreManquants(){
  ocreViewMode = ocreViewMode === 'manquants' ? 'tracker' : 'manquants';
  buildOcreView();
}

function showOcrePierres(){
  ocreViewMode = ocreViewMode === 'pierres' ? 'tracker' : 'pierres';
  buildOcreView();
}

function buildOcrePierresView(){
  if(!ocreData) return '';
  var html = '';

  // Formulaire prix
  html += '<div style="background:var(--mantle);border-radius:var(--radius);border:1.5px solid var(--surface0);padding:1rem 1.2rem;margin-bottom:1rem">'
    +'<div style="font-size:.62rem;font-weight:700;letter-spacing:.12em;color:var(--overlay0);text-transform:uppercase;margin-bottom:.8rem">Prix des pierres d\'âme (kamas)</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px">';
  STONE_SIZES.forEach(function(s){
    var val = stonePrices[s.name] || '';
    html += '<div style="display:flex;flex-direction:column;gap:3px">'
      +'<label style="font-size:.62rem;font-weight:600;color:'+s.color+';display:flex;align-items:center;gap:4px">'
      +'<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+s.color+';opacity:.7"></span>'
      +s.name+' (≤'+s.maxLvl+')'
      +'</label>'
      +'<input type="text" inputmode="numeric" placeholder="Prix..." value="'+(val?fmtTei(val):'')+'" '
      +'oninput="stonePrices[\''+s.name+'\']=parseTei(this.value)||0;this.value=fmtTei(parseTei(this.value))||this.value;saveStonePrices();updatePierresCalc()" '
      +'style="background:var(--surface0);border:1.5px solid var(--surface1);color:var(--text);padding:.35rem .6rem;border-radius:var(--radius-sm);font-size:.75rem;font-family:Inter,sans-serif;outline:none;width:100%">'
      +'</div>';
  });
  html += '</div></div>';

  // Calcul optimisé
  html += '<div id="pierresCalcResult"></div>';

  // Script inline pour recalcul
  html += '<script>updatePierresCalc();<\/script>';

  return html;
}

function updatePierresCalc(){
  var el = document.getElementById('pierresCalcResult');
  if(!el || !ocreData) return;

  var hasP = hasStonePrices();

  // Compter les monstres manquants par taille minimum requise
  var needBySize = {};
  STONE_SIZES.forEach(function(s){ needBySize[s.name] = 0; });
  var totalMissing = 0;
  ocreData.forEach(function(m){
    if(!ocreCaptured[m.id]){
      var s = getStoneSize(m.level_max);
      needBySize[s.name]++;
      totalMissing++;
    }
  });

  if(totalMissing === 0){
    el.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--green);font-size:.85rem;font-weight:600">🎉 Tous les monstres sont capturés !</div>';
    return;
  }

  var html = '';

  if(!hasP){
    // Pas de prix renseignés — afficher juste le résumé basique
    html += '<div style="background:var(--surface0);border-radius:var(--radius-sm);padding:.8rem 1rem;margin-bottom:1rem;font-size:.72rem;color:var(--subtext0)">'
      +'Renseigne les prix ci-dessus pour voir la stratégie optimale.</div>';

    html += '<div style="font-size:.62rem;font-weight:700;letter-spacing:.12em;color:var(--overlay0);text-transform:uppercase;margin-bottom:.6rem">Pierres minimum requises</div>';
    html += '<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:1rem">';
    STONE_SIZES.forEach(function(s){
      if(needBySize[s.name] > 0){
        html += '<div style="display:flex;align-items:center;gap:.5rem;background:var(--surface0);border-radius:var(--radius-sm);padding:.5rem .7rem">'
          +'<span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:'+s.color+';opacity:.7"></span>'
          +'<span style="font-size:.75rem;font-weight:600;color:'+s.color+';flex:1">'+s.name+'</span>'
          +'<span style="font-size:.82rem;font-weight:700;color:var(--text)">×'+needBySize[s.name]+'</span>'
          +'</div>';
      }
    });
    html += '</div>';
  } else {
    // Calculer stratégie minimum
    var costMin = 0;
    var buyMin = {};
    STONE_SIZES.forEach(function(s){ buyMin[s.name] = 0; });
    ocreData.forEach(function(m){
      if(!ocreCaptured[m.id]){
        var s = getStoneSize(m.level_max);
        var price = Number(stonePrices[s.name]) || 0;
        buyMin[s.name]++;
        costMin += price;
      }
    });

    // Calculer stratégie optimale (pour chaque monstre, prendre la pierre la moins chère qui couvre son niveau)
    var costOpti = 0;
    var buyOpti = {};
    STONE_SIZES.forEach(function(s){ buyOpti[s.name] = 0; });
    ocreData.forEach(function(m){
      if(!ocreCaptured[m.id]){
        var best = getBestStone(m.level_max);
        var price = Number(stonePrices[best.name]) || 0;
        buyOpti[best.name]++;
        costOpti += price;
      }
    });

    var savings = costMin - costOpti;

    // Affichage comparaison
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem">';

    // Colonne stratégie minimum
    html += '<div style="background:var(--surface0);border-radius:var(--radius);padding:.8rem 1rem">'
      +'<div style="font-size:.58rem;font-weight:700;letter-spacing:.1em;color:var(--overlay0);text-transform:uppercase;margin-bottom:.5rem">Pierres minimum</div>';
    STONE_SIZES.forEach(function(s){
      if(buyMin[s.name] > 0){
        var p = Number(stonePrices[s.name]) || 0;
        html += '<div style="display:flex;align-items:center;gap:4px;margin-bottom:3px">'
          +'<span style="display:inline-block;width:6px;height:6px;border-radius:2px;background:'+s.color+'"></span>'
          +'<span style="font-size:.65rem;color:'+s.color+';flex:1">'+s.name+' ×'+buyMin[s.name]+'</span>'
          +'<span style="font-size:.6rem;color:var(--overlay1)">'+fmtK(p*buyMin[s.name])+'k</span>'
          +'</div>';
      }
    });
    html += '<div style="border-top:1px solid var(--surface1);margin-top:.5rem;padding-top:.5rem;font-size:.82rem;font-weight:700;color:var(--text)">'+fmtK(costMin/1000)+' kk</div>'
      +'</div>';

    // Colonne stratégie optimale
    html += '<div style="background:var(--mantle);border-radius:var(--radius);padding:.8rem 1rem;border:1.5px solid var(--mauve)">'
      +'<div style="font-size:.58rem;font-weight:700;letter-spacing:.1em;color:var(--mauve);text-transform:uppercase;margin-bottom:.5rem">Stratégie optimale ✨</div>';
    STONE_SIZES.forEach(function(s){
      if(buyOpti[s.name] > 0){
        var p = Number(stonePrices[s.name]) || 0;
        var isUpgrade = buyOpti[s.name] > needBySize[s.name];
        html += '<div style="display:flex;align-items:center;gap:4px;margin-bottom:3px">'
          +'<span style="display:inline-block;width:6px;height:6px;border-radius:2px;background:'+s.color+'"></span>'
          +'<span style="font-size:.65rem;color:'+s.color+';flex:1">'+s.name+' ×'+buyOpti[s.name]+(isUpgrade?' ↑':'')+'</span>'
          +'<span style="font-size:.6rem;color:var(--overlay1)">'+fmtK(p*buyOpti[s.name])+'k</span>'
          +'</div>';
      }
    });
    html += '<div style="border-top:1px solid var(--surface1);margin-top:.5rem;padding-top:.5rem;font-size:.82rem;font-weight:700;color:var(--mauve)">'+fmtK(costOpti/1000)+' kk</div>'
      +'</div>';

    html += '</div>';

    // Économie
    if(savings > 0){
      html += '<div style="background:rgba(166,227,161,.1);border-radius:var(--radius-sm);padding:.6rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem">'
        +'<span style="font-size:.82rem">💰</span>'
        +'<span style="font-size:.75rem;font-weight:600;color:var(--green)">Économie : '+fmtK(savings/1000)+' kk en prenant des pierres plus grandes !</span>'
        +'</div>';
    } else if(savings === 0){
      html += '<div style="background:var(--surface0);border-radius:var(--radius-sm);padding:.6rem 1rem;margin-bottom:1rem;font-size:.72rem;color:var(--subtext0)">'
        +'Les pierres minimum sont déjà l\'option la moins chère.</div>';
    }
  }

  el.innerHTML = html;
}

function buildOcreManquantsView(){
  if(!ocreData) return '';
  var totalPersos = ocrePersos.length;
  // Charger les captures de tous les persos
  var allCaptures = {};
  ocrePersos.forEach(function(p){
    var capts = getOcrePersoCaptures(p.id);
    Object.keys(capts).forEach(function(mid){
      if(!allCaptures[mid]) allCaptures[mid] = [];
      allCaptures[mid].push(p);
    });
  });

  // Grouper par étape
  var byStep = {};
  ocreData.forEach(function(m){
    var step = m.step || 1;
    if(!byStep[step]) byStep[step] = [];
    byStep[step].push(m);
  });
  var steps = Object.keys(byStep).map(Number).sort(function(a,b){return a-b;});

  // Calculer totaux
  var totalManquant = 0;
  ocreData.forEach(function(m){
    var done = (allCaptures[m.id] || []).length;
    totalManquant += totalPersos - done;
  });

  var html = '';

  // Stats globales
  html += '<div class="ocre-stats" style="grid-template-columns:repeat(3,1fr);margin-bottom:1rem">'
    +'<div class="ocre-stat"><div class="ocre-stat-v" style="color:var(--red)">'+totalManquant+'</div><div class="ocre-stat-l">Captures manquantes</div></div>'
    +'<div class="ocre-stat"><div class="ocre-stat-v" style="color:var(--mauve)">'+totalPersos+'</div><div class="ocre-stat-l">Personnages</div></div>'
    +'<div class="ocre-stat"><div class="ocre-stat-v" style="color:var(--green)">'+(totalPersos * ocreData.length - totalManquant)+'</div><div class="ocre-stat-l">Captures faites</div></div>'
    +'</div>';

  // Légende persos
  html += '<div style="display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem">';
  ocrePersos.forEach(function(p,i){
    var colors = ['var(--mauve)','var(--blue)','var(--peach)','var(--green)','var(--pink)','var(--yellow)','var(--teal)','var(--red)'];
    var col = colors[i % colors.length];
    html += '<span style="font-size:.62rem;font-weight:600;padding:2px 8px;border-radius:4px;background:color-mix(in srgb, '+col+' 20%, transparent);color:'+col+'">'+p.name+(p.classe?' ('+p.classe+')':'')+'</span>';
  });
  html += '</div>';

  steps.forEach(function(step){
    var mons = byStep[step] || [];
    var stepManquant = 0;
    mons.forEach(function(m){
      var done = (allCaptures[m.id] || []).length;
      stepManquant += totalPersos - done;
    });
    if(stepManquant === 0) return; // étape complète pour tous

    html += '<div class="ocre-step-title">Étape <span>'+step+'</span>'
      +'<span class="step-prog" style="color:var(--red)">('+stepManquant+' manquant'+(stepManquant>1?'s':'')+')</span>'
      +'<span style="flex:1;height:1px;background:var(--surface0)"></span>'
      +'</div>';

    html += '<div class="ocre-manq-list">';
    mons.forEach(function(m){
      var capturedBy = allCaptures[m.id] || [];
      var missing = totalPersos - capturedBy.length;
      if(missing === 0) return;

      var name = (typeof m.name === 'string') ? m.name : (m.name && m.name.fr) || '?';
      var type = (typeof m.type === 'string') ? m.type : (m.type && m.type.name && m.type.name.fr) || '';
      var img = ocreImgUrl(m.name);
      var typeBg = type==='archimonstre'?'rgba(203,166,247,.25)':type==='boss'?'rgba(243,139,168,.25)':'rgba(137,180,250,.2)';
      var typeFg = type==='archimonstre'?'var(--mauve)':type==='boss'?'var(--red)':'var(--blue)';
      var typeLabel = type==='archimonstre'?'⚡ Archi':type==='boss'?'💀 Boss':'🐾 Monstre';

      // Pastilles par perso
      var dots = '';
      var colors = ['var(--mauve)','var(--blue)','var(--peach)','var(--green)','var(--pink)','var(--yellow)','var(--teal)','var(--red)'];
      ocrePersos.forEach(function(p,i){
        var col = colors[i % colors.length];
        var done = capturedBy.some(function(cp){ return cp.id === p.id; });
        dots += '<span title="'+p.name+(done?' ✓':' ✗')+'" style="display:inline-block;width:10px;height:10px;border-radius:50%;'
          +(done?'background:'+col+';opacity:1':'background:var(--surface1);opacity:.5;border:1px solid var(--surface2)')
          +';flex-shrink:0"></span>';
      });

      var lvl = m.level_min === m.level_max ? 'Niv. '+m.level_min : 'Niv. '+m.level_min+'-'+m.level_max;
      var stone = getStoneSize(m.level_max);

      html += '<div class="ocre-manq-row">'
        +'<div class="ocre-card-img" style="width:30px;height:30px">'
        +'<img src="'+img+'" style="width:26px;height:26px;image-rendering:pixelated" onerror="this.style.display=\'none\'">'
        +'</div>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:.75rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+name+'</div>'

var _craftSearchCache = {};
function craftSearch(query, cb){
  if(!query || query.length < 2){ cb([]); return; }
  var key = query.toLowerCase();
  if(_craftSearchCache[key]){ cb(_craftSearchCache[key]); return; }
  fetch('https://api.dofusdu.de/dofus3/v1/fr/items/resources/search?query='+encodeURIComponent(query)+'&limit=8')
    .then(function(r){ return r.ok ? r.json() : []; })
    .then(function(data){
      var results = (data||[]).map(function(d){ return { id:d.ankama_id, name:d.name, img:(d.image_urls&&d.image_urls.icon)||'' }; });
      _craftSearchCache[key] = results;
      cb(results);
    }).catch(function(){ cb([]); });
}

function craftEquipSearch(query, cb){
  if(!query || query.length < 2){ cb([]); return; }
  var promises = [
    fetch('https://api.dofusdu.de/dofus3/v1/fr/items/equipment/search?query='+encodeURIComponent(query)+'&limit=5').then(function(r){return r.ok?r.json():[]}).then(function(d){return (d||[]).map(function(x){x._cat='equipment';return x;})}).catch(function(){return [];}),
    fetch('https://api.dofusdu.de/dofus3/v1/fr/items/consumables/search?query='+encodeURIComponent(query)+'&limit=5').then(function(r){return r.ok?r.json():[]}).then(function(d){return (d||[]).map(function(x){x._cat='consumables';return x;})}).catch(function(){return [];}),
    fetch('https://api.dofusdu.de/dofus3/v1/fr/items/resources/search?query='+encodeURIComponent(query)+'&limit=5').then(function(r){return r.ok?r.json():[]}).then(function(d){return (d||[]).map(function(x){x._cat='resources';return x;})}).catch(function(){return [];})
  ];
  Promise.all(promises).then(function(res){
    var all = [];
    res.forEach(function(arr){ (arr||[]).forEach(function(d){ all.push({ id:d.ankama_id, name:d.name, img:(d.image_urls&&d.image_urls.icon)||'', level:d.level||0, cat:d._cat||'' }); }); });
    cb(all.slice(0,10));
  });
}

function updateCraftResult(){
  var totalCost = 0;
  craftData.resources.forEach(function(r, i){
    var sub = (r.qty||1) * (r.price||0);
    totalCost += sub;
    var el = document.getElementById('craftSubtotal'+i);
    if(el) el.textContent = fmtK(sub/1000)+'k';
  });
  var costEl = document.getElementById('craftTotalCost');
  if(costEl) costEl.textContent = fmtK(totalCost/1000);

  var taxRate = 0.02;
  var sellHDV = craftData.sellHDV || 0;
  var sellFinal = craftData.sellFinal || 0;
  var netHDV = Math.floor(sellHDV * (1 - taxRate));
  var netFinal = Math.floor(sellFinal * (1 - taxRate));

  var netHDVEl = document.getElementById('craftNetHDV');
  if(netHDVEl) netHDVEl.textContent = sellHDV ? 'Net : '+fmtK(netHDV/1000)+'k' : '';
  var netFinalEl = document.getElementById('craftNetFinal');
  if(netFinalEl) netFinalEl.textContent = sellFinal ? 'Net : '+fmtK(netFinal/1000)+'k' : '';

  var profitHDV = netHDV - totalCost;
  var profitFinal = netFinal - totalCost;
  var rentaHDV = totalCost > 0 ? Math.round(profitHDV / totalCost * 100) : 0;
  var rentaFinal = totalCost > 0 ? Math.round(profitFinal / totalCost * 100) : 0;

  var resEl = document.getElementById('craftResults');
  if(!resEl) return;

  function col(label, icon, color, net, profit, renta){
    var pColor = profit > 0 ? 'var(--green)' : profit < 0 ? 'var(--red)' : 'var(--overlay0)';
    return '<div style="background:var(--surface0);border-radius:var(--radius-sm);padding:.7rem .8rem">'
      +'<div style="font-size:.58rem;font-weight:700;color:'+color+';text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem">'+icon+' '+label+'</div>'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:.65rem;color:var(--overlay1)">Coût craft</span><span style="font-size:.68rem;color:var(--text)">'+fmtK(totalCost/1000)+'k</span></div>'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:.65rem;color:var(--overlay1)">Net après taxe</span><span style="font-size:.68rem;font-weight:600;color:var(--text)">'+fmtK(net/1000)+'k</span></div>'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:.65rem;color:var(--overlay1)">Profit</span><span style="font-size:.72rem;font-weight:700;color:'+pColor+'">'+(profit>=0?'+':'')+fmtK(profit/1000)+'k</span></div>'
      +'<div style="display:flex;justify-content:space-between"><span style="font-size:.65rem;color:var(--overlay1)">Rentabilité</span><span style="font-size:.68rem;font-weight:600;color:'+pColor+'">'+renta+'%</span></div>'
      +'</div>';
  }

  resEl.innerHTML = col('Prix marché HDV','📦','var(--blue)',netHDV,profitHDV,rentaHDV)
    + col('Prix vente final','✨','var(--mauve)',netFinal,profitFinal,rentaFinal);
}

function fetchCraftRecipe(ankId, category){
  var urls = [
    'https://api.dofusdu.de/dofus3/v1/fr/items/equipment/'+ankId,
    'https://api.dofusdu.de/dofus3/v1/fr/items/consumables/'+ankId,
    'https://api.dofusdu.de/dofus3/v1/fr/items/resources/'+ankId
  ];
  if(category === 'consumables') urls = [urls[1], urls[0], urls[2]];
  else if(category === 'resources') urls = [urls[2], urls[0], urls[1]];

  function tryUrl(i){
    if(i >= urls.length) return;
    fetch(urls[i]).then(function(r){
      if(!r.ok) throw new Error('not found');
      return r.json();
    }).then(function(data){
      console.log('Craft API recipe:', JSON.stringify((data&&data.recipe)||[]).substring(0,800));
      if(data && data.recipe && data.recipe.length > 0){
        // Recipe items have item_ankama_id, item_subtype, quantity
        // We need to fetch each resource's name
        var ingredients = data.recipe;
        var fetches = ingredients.map(function(ing){
          var subtype = ing.item_subtype || 'resources';
          var ingId = ing.item_ankama_id;
          if(!ingId) return Promise.resolve({name:'?', qty:ing.quantity||1, price:0});
          return fetch('https://api.dofusdu.de/dofus3/v1/fr/items/'+subtype+'/'+ingId)
            .then(function(r){ return r.ok ? r.json() : null; })
            .then(function(d){
              if(!d) return {name:'Item #'+ingId, qty:ing.quantity||1, price:0};
              var nm = typeof d.name === 'string' ? d.name : (d.name && d.name.fr) || d.name || 'Item #'+ingId;
              var img = (d.image_urls && (d.image_urls.icon || d.image_urls.sd)) || '';
              return {name:nm, qty:ing.quantity||1, price:0, img:img};
            }).catch(function(){ return {name:'Item #'+ingId, qty:ing.quantity||1, price:0}; });
        });
        Promise.all(fetches).then(function(resources){
          craftData.resources = resources;
          renderCrafteur();
          toast('📜 Recette chargée — '+resources.length+' ingrédients');
        });
      } else {
        tryUrl(i+1);
      }
    }).catch(function(){ tryUrl(i+1); });
  }
  tryUrl(0);
}

  if(!sug || !val || val.length < 2){ if(sug) sug.style.display='none'; return; }

function saveCraftCurrent(){
  var totalCost = 0;
  craftData.resources.forEach(function(r){ totalCost += (r.qty||1)*(r.price||0); });
  var netHDV = Math.floor((craftData.sellHDV||0) * 0.98);
  var profit = netHDV - totalCost;
  craftSaves.unshift({ name:craftData.name||'Sans nom', resources:JSON.parse(JSON.stringify(craftData.resources)), sellHDV:craftData.sellHDV, sellFinal:craftData.sellFinal, cost:totalCost, profit:profit, date:Date.now() });
  saveCrafts();
  toast('💾 Craft sauvegardé !');
  renderCrafteur();
}

function loadCraft(i){
  var s = craftSaves[i];
  if(!s) return;
  craftData.name = s.name || '';
  craftData.resources = JSON.parse(JSON.stringify(s.resources || []));
  craftData.sellHDV = s.sellHDV || 0;

var notes = {};
var activeNoteId = null;
var notesSaveDebounce = null;

try { notes = JSON.parse(localStorage.getItem('alm_notes') || '{}'); } catch(e) {}

function saveNotes(){ try { localStorage.setItem('alm_notes', JSON.stringify(notes)); } catch(e) {} triggerAutoSave(); }
function noteId(){ return 'n' + Date.now(); }
function fmtNoteDate(ts){ var d=new Date(ts); return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes()); }
function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderNotes(){
  var el = document.getElementById('notesContent');
  var ids = Object.keys(notes).sort(function(a,b){ return notes[b].updated - notes[a].updated; });
  if(!activeNoteId || !notes[activeNoteId]) activeNoteId = ids[0] || null;
  var sidebarHtml = ids.map(function(id){
    var n = notes[id];
    var preview = (n.body||'').replace(/\n/g,' ').trim();
    return '<div class="note-item'+(id===activeNoteId?' active':'')+'" onclick="selectNote(\''+id+'\')">'
      +'<div class="note-item-title">'+(escapeHtml(n.title)||'Sans titre')+'</div>'
      +'<div class="note-item-preview">'+(escapeHtml(preview.slice(0,60))||'<em style="color:var(--overlay0)">Vide</em>')+'</div>'
      +'<div class="note-item-date">'+fmtNoteDate(n.updated)+'</div>'
      +'</div>';
  }).join('');
  var editorHtml = '';
  if(activeNoteId && notes[activeNoteId]){
    var n = notes[activeNoteId];
    editorHtml = '<div style="height:100%;display:flex;flex-direction:column;gap:8px">'
      +'<div class="notes-editor-top">'
      +'<input class="notes-title-input" id="noteTitleInput" value="'+escapeHtml(n.title||'')+'" placeholder="Titre de la note..." oninput="updateNoteTitle(this.value)">'
      +'<span class="notes-save-indicator saved" id="notesSaveInd">✓ Sauvegardé</span>'
      +'<button class="notes-delete-btn" onclick="deleteNote(\''+activeNoteId+'\')">🗑 Supprimer</button>'
      +'</div>'
      +'<textarea class="notes-textarea" id="noteBodyInput" placeholder="Écris tes notes ici..." oninput="updateNoteBody(this.value)">'+escapeHtml(n.body||'')+'</textarea>'
      +'</div>';
  } else {
    editorHtml = '<div class="notes-empty">📝<span>Crée une note pour commencer</span></div>';
  }
  el.innerHTML = '<div class="notes-layout">'
    +'<div class="notes-sidebar">'
    +'<button class="notes-new-btn" onclick="newNote()">+ Nouvelle note</button>'
    +'<div class="notes-list">'+sidebarHtml+'</div>'
    +'</div>'
    +'<div style="min-height:0;display:flex;flex-direction:column">'+editorHtml+'</div>'
    +'</div>';
}

function newNote(){
  var id = noteId();
  notes[id] = { title:'', body:'', created:Date.now(), updated:Date.now() };
  activeNoteId = id; saveNotes(); renderNotes();
  var t = document.getElementById('noteTitleInput'); if(t) t.focus();
}

function selectNote(id){ activeNoteId = id; renderNotes(); }

function updateNoteTitle(val){
  if(!activeNoteId) return;
  notes[activeNoteId].title = val; notes[activeNoteId].updated = Date.now();
  scheduleNotesSave();
}

function updateNoteBody(val){
  if(!activeNoteId) return;
  notes[activeNoteId].body = val; notes[activeNoteId].updated = Date.now();
  scheduleNotesSave();
}

function scheduleNotesSave(){
  var ind = document.getElementById('notesSaveInd');
  if(ind){ ind.textContent='…'; ind.classList.remove('saved'); }
  clearTimeout(notesSaveDebounce);
  notesSaveDebounce = setTimeout(function(){
    saveNotes();
    var ind2 = document.getElementById('notesSaveInd');
    if(ind2){ ind2.textContent='✓ Sauvegardé'; ind2.classList.add('saved'); }
  }, 600);
}

function deleteNote(id){
  if(!confirm('Supprimer cette note ?')) return;
  delete notes[id]; if(activeNoteId===id) activeNoteId=null;
  saveNotes(); renderNotes();
}

var SAVE_KEYS = ['alm_mylist','alm_n','alm_td','alm_ti','alm_tp','alm_rd','alm_notes','alm_ocre','alm_ocre_persos','alm_ocre_active','alm_ocre_stone_prices','alm_crafts'];
var _fsHandle = null, _fsDebounce = null, _fsSaving = false;

function _buildSavePayload(){
  var save = { version: 1, date: new Date().toISOString(), data: {} };
  SAVE_KEYS.forEach(function(k){ var v=localStorage.getItem(k); if(v!==null) save.data[k]=v; });
  // Save per-perso captures
  ocrePersos.forEach(function(p){
    var k = 'alm_ocre_' + p.id;
    var v = localStorage.getItem(k);
    if(v!==null) save.data[k] = v;
  });
  return JSON.stringify(save, null, 2);
}

function _setSaveStatus(s){
  var el = document.getElementById('saveStatus');
  if(!el) return;
  if(s==='ok')      { el.textContent='✅ Sauvegardé'; el.style.color='var(--green)'; }
  else if(s==='saving') { el.textContent='🔄...'; el.style.color='var(--yellow)'; }
  else if(s==='err')    { el.textContent='❌ Erreur'; el.style.color='var(--red)'; }
  else if(s==='linked') { el.textContent='📁 Lié'; el.style.color='var(--blue)'; }
}

async function linkSaveFile(){
  try {
    if(!window.showSaveFilePicker){ toast('❌ Non supporté (utilise Chrome/Edge)'); return; }
    _fsHandle = await window.showSaveFilePicker({
      suggestedName: 'blaze-tools-save.json',
      types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
    });
    _setSaveStatus('linked');
    toast('📁 Fichier lié — sauvegarde auto activée !');
    await _writeToFile();
  } catch(e) { if(e.name!=='AbortError') toast('❌ Erreur : '+e.message); }
}

async function _writeToFile(){
  if(!_fsHandle || _fsSaving) return;
  _fsSaving = true; _setSaveStatus('saving');
  try {
    var writable = await _fsHandle.createWritable();
    await writable.write(_buildSavePayload());
    await writable.close();
    _setSaveStatus('ok');
  } catch(e) { _setSaveStatus('err'); toast('❌ Sauvegarde échouée : '+e.message); }
  _fsSaving = false;
}

function triggerAutoSave(){
  if(_fsHandle){
    clearTimeout(_fsDebounce);
    _fsDebounce = setTimeout(_writeToFile, 600);
  }
  triggerAutoSync();
}

function exportData(){
  try {
    var save = { version: 1, date: new Date().toISOString(), data: {} };
    SAVE_KEYS.forEach(function(k){
      var v = localStorage.getItem(k);
      if(v !== null) save.data[k] = v;
    });
    var blob = new Blob([JSON.stringify(save, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    var d = new Date();
    a.download = 'blaze-tools-' + d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('✅ Sauvegarde téléchargée !');
  } catch(e) { toast('❌ Erreur export : ' + e.message); }
}

function importData(event){
  var file = event.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var save = JSON.parse(e.target.result);
      if(!save || !save.data) throw new Error('Format invalide');
      var count = 0;
      Object.keys(save.data).forEach(function(k){
        if(SAVE_KEYS.indexOf(k) !== -1 || k.indexOf('alm_ocre_p_') === 0) {
          localStorage.setItem(k, save.data[k]);
          count++;
        }
      });
      toast('✅ ' + count + ' entrées restaurées — rechargement...');
      setTimeout(function(){ location.reload(); }, 1500);
    } catch(e) { toast('❌ Erreur import : ' + e.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

/* ── GitHub Gist Sync ─────────────────────────────── */
var gistToken = '';
var gistId = '';
try { gistToken = localStorage.getItem('alm_gist_token') || ''; } catch(e){}
try { gistId = localStorage.getItem('alm_gist_id') || ''; } catch(e){}

function saveGistConfig(){
  try { localStorage.setItem('alm_gist_token', gistToken); } catch(e){}
  try { localStorage.setItem('alm_gist_id', gistId); } catch(e){}
}

function _getAllSaveData(){
  var save = { version: 1, date: new Date().toISOString(), data: {} };
  SAVE_KEYS.forEach(function(k){ var v=localStorage.getItem(k); if(v!==null) save.data[k]=v; });
  ocrePersos.forEach(function(p){
    var k = 'alm_ocre_' + p.id;
    var v = localStorage.getItem(k);
    if(v!==null) save.data[k] = v;
  });
  return save;
}

function gistPush(){
  if(!gistToken){ toast('❌ Token non configuré'); return; }
  var payload = JSON.stringify(_getAllSaveData(), null, 2);
  var body = { description: 'Blaze-Tools save', public: false, files: { 'blaze-tools-save.json': { content: payload } } };

  var url, method;
  if(gistId){
    url = 'https://api.github.com/gists/' + gistId;
    method = 'PATCH';
  } else {
    url = 'https://api.github.com/gists';
    method = 'POST';
  }

  toast('☁️ Envoi en cours...');
  fetch(url, {
    method: method,
    headers: { 'Authorization': 'Bearer ' + gistToken, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).then(function(r){
    if(!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }).then(function(data){
    if(!gistId && data.id){
      gistId = data.id;
      saveGistConfig();
      var el = document.getElementById('gistIdDisplay');
      if(el) el.textContent = gistId;
    }
    toast('✅ Données envoyées !');
    try { localStorage.setItem('alm_gist_last_sync', String(Date.now())); } catch(e){}
    var el = document.getElementById('syncLastDate');
    if(el) el.textContent = 'Dernière sync : ' + new Date().toLocaleString('fr-FR');
  }).catch(function(e){
    toast('❌ Erreur push : ' + e.message);
  });
}

function gistPull(){
  if(!gistToken){ toast('❌ Token non configuré'); return; }
  if(!gistId){ toast('❌ Aucun Gist lié — fais d\'abord un push'); return; }

  toast('☁️ Récupération...');
  fetch('https://api.github.com/gists/' + gistId, {
    headers: { 'Authorization': 'Bearer ' + gistToken }
  }).then(function(r){
    if(!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }).then(function(data){
    var file = data.files && data.files['blaze-tools-save.json'];
    if(!file || !file.content) throw new Error('Fichier non trouvé dans le Gist');
    var save = JSON.parse(file.content);
    if(!save || !save.data) throw new Error('Format invalide');
    var count = 0;
    Object.keys(save.data).forEach(function(k){
      if(SAVE_KEYS.indexOf(k) !== -1 || k.indexOf('alm_ocre_p_') === 0){
        localStorage.setItem(k, save.data[k]);
        count++;
      }
    });
    toast('✅ ' + count + ' entrées restaurées — rechargement...');
    setTimeout(function(){ location.reload(); }, 1200);
  }).catch(function(e){
    toast('❌ Erreur pull : ' + e.message);
  });
}

/* ── Auto-sync ────────────────────────────────────── */
var _gistSyncDebounce = null;
var _gistSyncing = false;

function triggerAutoSync(){
  if(!gistToken || !gistId) return;
  clearTimeout(_gistSyncDebounce);
  _gistSyncDebounce = setTimeout(_doGistPush, 1500);
}

function _doGistPush(){
  if(!gistToken || !gistId || _gistSyncing) return;
  _gistSyncing = true;
  var payload = JSON.stringify(_getAllSaveData(), null, 2);
  fetch('https://api.github.com/gists/' + gistId, {
    method: 'PATCH',
    headers: { 'Authorization': 'Bearer ' + gistToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ files: { 'blaze-tools-save.json': { content: payload } } })
  }).then(function(r){
    if(!r.ok) throw new Error('HTTP ' + r.status);
    try { localStorage.setItem('alm_gist_last_sync', String(Date.now())); } catch(e){}
    _setSaveStatus('ok');
  }).catch(function(e){
    console.warn('Auto-sync push failed:', e.message);
  }).finally(function(){ _gistSyncing = false; });
}

// Push quand on quitte la page
window.addEventListener('beforeunload', function(){
  if(!gistToken || !gistId) return;
  var payload = JSON.stringify(_getAllSaveData(), null, 2);
  navigator.sendBeacon('https://api.github.com/gists/' + gistId, new Blob([JSON.stringify({ files: { 'blaze-tools-save.json': { content: payload } } })], {type:'application/json'}));
});

function autoSyncPull(){
  if(!gistToken || !gistId) return;
  fetch('https://api.github.com/gists/' + gistId, {
    headers: { 'Authorization': 'Bearer ' + gistToken }
  }).then(function(r){
    if(!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }).then(function(data){
    var file = data.files && data.files['blaze-tools-save.json'];
    if(!file || !file.content) return;
    var save = JSON.parse(file.content);
    if(!save || !save.data || !save.date) return;
    var remoteDate = new Date(save.date).getTime();
    var lastSync = 0;
    try { lastSync = parseInt(localStorage.getItem('alm_gist_last_sync') || '0'); } catch(e){}
    if(remoteDate > lastSync + 5000){
      var count = 0;
      Object.keys(save.data).forEach(function(k){
        if(SAVE_KEYS.indexOf(k) !== -1 || k.indexOf('alm_ocre_p_') === 0){
          localStorage.setItem(k, save.data[k]);
          count++;
        }
      });
      if(count > 0){
        try { localStorage.setItem('alm_gist_last_sync', String(remoteDate)); } catch(e){}
        console.log('Auto-sync: pulled ' + count + ' entries from Gist');
        location.reload();
      }
    }
  }).catch(function(e){
    console.warn('Auto-sync pull failed:', e.message);
  });
}
